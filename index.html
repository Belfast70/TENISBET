// BACKTEST ENGINE — sin look-ahead, Elo incremental punto a punto
// Para cada partido usamos SOLO los datos disponibles ANTES de él
// Fuente: Jeff Sackmann CSV 2023-2025 (resultados reales)
// ═══════════════════════════════════════════════════════════════

async function runTennisBacktest(tour, year, surface, minMatches, onProg) {
  onProg(`📥 Descargando partidos ${tour} ${year}…`, 5);
  // Necesitamos histórico previo para construir Elo (2 años antes)
  const buildYears = year===2026?[2024,2025]:year===2025?[2023,2024]:year===2024?[2022,2023]:[2021,2022];
  let buildMatches=[];
  for(let i=0;i<buildYears.length;i++){
    onProg(`📚 Cargando histórico ${buildYears[i]} para Elo inicial…`, 5+i*10);
    const m=await fetchMatches(tour,buildYears[i]);
    buildMatches.push(...m);
  }
  onProg(`📥 Cargando partidos de prueba ${year}…`, 28);
  const testMatches=await fetchMatches(tour,year);

  onProg(`🧮 Construyendo Elo base con ${buildMatches.length.toLocaleString()} partidos…`, 35);

  // Estado Elo inicial (construido con años previos, sin el año de prueba)
  const ratings=buildElo(buildMatches);

  onProg(`🔬 Simulando ${testMatches.length} partidos sin look-ahead…`, 50);

  const results=[];
  let correct=0, total=0, totalEdge=0;
  let pnl=0, pnlCurve=[];
  // Para O/U: simular over/under de sets (O1.5 sets = al menos 2 sets)
  let ouCorrect=0, ouTotal=0;

  // Ordenar por fecha
  const sorted=[...testMatches].sort((a,b)=>(a.tourney_date||'').localeCompare(b.tourney_date||''));

  // Filtrar por superficie si se pide
  const toProcess=surface==='All'?sorted:sorted.filter(m=>normSurf(m.surface)===surface);

  for(const m of toProcess){
    const wId=m.winner_id, lId=m.loser_id;
    if(!wId||!lId) continue;

    // Construir objetos de jugador con el Elo ACTUAL (antes de este partido)
    const wr=ratings[wId];
    const lr=ratings[lId];

    // Saltar si alguno no tiene historial mínimo
    if(!wr||!lr) { updateElo(ratings,m); continue; }
    if(wr.count<minMatches||lr.count<minMatches) { updateElo(ratings,m); continue; }

    const surf=normSurf(m.surface);

    // Snap del estado actual (antes de actualizar)
    const snap1={...wr,sc:{...wr.sc},sw:{...wr.sw},sv:{...wr.sv},svL:{...wr.svL},ret:{...wr.ret}};
    const snap2={...lr,sc:{...lr.sc},sw:{...lr.sc},sv:{...lr.sv},svL:{...lr.svL},ret:{...lr.ret}};

    // Predicción con el estado PRE-partido
    // El ganador real es el winner_id
    const pred=predictMatch(snap1,snap2,surf,null);
    if(!pred||pred.p1===pred.p2){ updateElo(ratings,m); continue; }

    const modelPicksWinner = pred.p1>=pred.p2; // true = modelo predice que p1 (winner) gana
    const modelCorrect = modelPicksWinner; // winner_id siempre es el ganador real

    // Score/sets — parsear score si está disponible
    let sets1=0,sets2=0;
    if(m.score){
      const setScores=(m.score||'').split(' ');
      for(const s of setScores){
        const clean=s.replace(/\[.*?\]/g,'').replace(/\(.*?\)/g,'').trim();
        const parts=clean.split('-');
        if(parts.length===2){
          const a=parseInt(parts[0]),b=parseInt(parts[1]);
          if(!isNaN(a)&&!isNaN(b)){
            if(a>b) sets1++; else if(b>a) sets2++;
          }
        }
      }
    }
    const totalSets=sets1+sets2;
    // O/U 1.5 sets: over = 2+ sets played (always true in best-of-3 if completed)
    // Better: O/U 2.5 games total sets — predict if match goes to 3 sets
    const wentTo3Sets=totalSets>=3;
    const predGoes3=pred.mc&&(pred.mc.s21+pred.mc.s12)>45; // MC predicts >45% chance of 3 sets
    const ouMatchCorrect=predGoes3===wentTo3Sets;

    const probFav=Math.max(pred.p1,pred.p2)/100;

    // P&L flat €100 con implied odds aprox -110 (1.91 decimal)
    pnl+=modelCorrect?90.91:-100;
    pnlCurve.push({i:results.length,pnl:+pnl.toFixed(2),correct:modelCorrect,
      date:m.tourney_date,game:`${wr.name||wId} v ${lr.name||lId}`});

    if(modelCorrect) correct++;
    if(ouMatchCorrect) ouCorrect++;
    ouTotal++;
    total++;

    results.push({
      date:m.tourney_date,
      tourney:m.tourney_name||'',
      round:m.round||'',
      surf,
      p1:snap1.name||wId,
      p2:snap2.name||lId,
      winner:snap1.name||wId,   // winner_id = winner always in Sackmann
      modelPick:modelPicksWinner?(snap1.name||wId):(snap2.name||lId),
      modelProb:Math.max(pred.p1,pred.p2),
      correct:modelCorrect,
      ouPred:predGoes3?'3 SETS':'2 SETS',
      ouReal:wentTo3Sets?'3 SETS':'2 SETS',
      ouCorrect:ouMatchCorrect,
      score:m.score||'',
      conf:pred.conf,
      eloGap:Math.abs(pred.eloOv-50),
      usedSurf:pred.usedSurfForm,
      usedPP:pred.usedRealPP,
    });

    // Ahora actualizar Elo con el resultado real
    updateElo(ratings,m);
  }

  // Stats
  const acc=total>0?+(correct/total*100).toFixed(1):0;
  const ouAcc=ouTotal>0?+(ouCorrect/ouTotal*100).toFixed(1):0;
  const roi=total>0?+(pnl/(total*100)*100).toFixed(1):0;

  // Por nivel de confianza
  const tiers=[
    {label:'Alta conf (≥75%)',min:75,max:100},
    {label:'Media (65-74%)',min:65,max:75},
    {label:'Baja (<65%)',min:0,max:65},
  ].map(t=>{
    const sub=results.filter(r=>r.modelProb>=t.min&&r.modelProb<t.max);
    const c=sub.filter(r=>r.correct).length;
    return{...t,n:sub.length,correct:c,acc:sub.length?+(c/sub.length*100).toFixed(1):null};
  });

  // Por superficie
  const surfs=['Hard','Clay','Grass'];
  const bySurf=surfs.map(s=>{
    const sub=results.filter(r=>r.surf===s);
    const c=sub.filter(r=>r.correct).length;
    return{surf:s,n:sub.length,correct:c,acc:sub.length?+(c/sub.length*100).toFixed(1):null};
  });

  // Calibration: avg model prob vs actual win rate in buckets
  const buckets=[55,60,65,70,75,80,85,90].map(b=>{
    const sub=results.filter(r=>r.modelProb>=b&&r.modelProb<b+5);
    const c=sub.filter(r=>r.correct).length;
    return{label:`${b}-${b+5}%`,n:sub.length,pred:b+2.5,actual:sub.length?+(c/sub.length*100).toFixed(1):null};
  });

  return{results,pnlCurve,acc,ouAcc,roi,total,correct,ouCorrect,ouTotal,pnl:+pnl.toFixed(2),tiers,bySurf,buckets};
}

// Update Elo ratings with a single match result (used during backtest)
function updateElo(ratings,m){
  const ELO0_=1500;
  const TOURNEY_K_={G:32,M:24,A:16,D:8,F:28,C:12};
  const wId=m.winner_id,lId=m.loser_id;
  if(!wId||!lId) return;
  const surf=normSurf(m.surface);
  const K=(TOURNEY_K_[m.tourney_level]||12)*(m.round==='F'?1.5:m.round==='SF'?1.2:1);
  const ens=id=>{if(!ratings[id])ratings[id]={id,name:'',overall:ELO0_,Hard:ELO0_,Clay:ELO0_,Grass:ELO0_,Carpet:ELO0_,count:0,wins:0,losses:0,sc:{Hard:0,Clay:0,Grass:0,Carpet:0},sw:{Hard:0,Clay:0,Grass:0,Carpet:0},formAll:[],formHard:[],formClay:[],formGrass:[],formCarpet:[],sv:{aces:0,df:0,svpt:0,fin:0,fwon:0,swon:0,bps:0,bpf:0,n:0},svL:{aces:0,df:0,svpt:0,fin:0,fwon:0,swon:0,bps:0,bpf:0,n:0},ret:{bpw:0,bpf:0,n:0},datelog:[],lastDate:''};return ratings[id];};
  const w=ens(wId),l=ens(lId);
  if(m.winner_name&&!w.name) w.name=m.winner_name;
  if(m.loser_name&&!l.name) l.name=m.loser_name;
  const eo=eloExp(w.overall,l.overall);
  w.overall+=K*(1-eo); l.overall+=K*(0-eo);
  const es=eloExp(w[surf]||ELO0_,l[surf]||ELO0_);
  w[surf]+=K*(1-es); l[surf]+=K*(0-es);
  w.count++;w.wins++;w.sc[surf]++;w.sw[surf]++;
  l.count++;l.losses++;l.sc[surf]++;
  w.formAll.push(1);if(w.formAll.length>20)w.formAll.shift();
  l.formAll.push(0);if(l.formAll.length>20)l.formAll.shift();
  const wk='form'+surf,lk='form'+surf;
  w[wk].push(1);if(w[wk].length>15)w[wk].shift();
  l[lk].push(0);if(l[lk].length>15)l[lk].shift();
  if(m.tourney_date){w.datelog.push(m.tourney_date);if(w.datelog.length>60)w.datelog.shift();l.datelog.push(m.tourney_date);if(l.datelog.length>60)l.datelog.shift();}
}

// ── PnL Chart SVG ────────────────────────────────────────────
function PnlChart({curve,height=180}){
  if(!curve||curve.length<2) return null;
  const w=680,pad={l:55,r:16,t:14,b:28},iW=w-pad.l-pad.r,iH=height-pad.t-pad.b;
  const vals=curve.map(p=>p.pnl);
  const minV=Math.min(0,...vals),maxV=Math.max(0,...vals);
  const range=maxV-minV||1;
  const scX=i=>pad.l+(i/(curve.length-1))*iW;
  const scY=v=>pad.t+iH-((v-minV)/range)*iH;
  const zY=scY(0);
  const pts=curve.map((p,i)=>`${scX(i).toFixed(1)},${scY(p.pnl).toFixed(1)}`);
  const line=`M ${pts.join(' L ')}`;
  const fill=`M ${scX(0)},${zY} L ${pts.join(' L ')} L ${scX(curve.length-1)},${zY} Z`;
  const lastV=vals[vals.length-1];
  const lc=lastV>=0?C.lime:C.rose;
  const yTicks=4;
  const yLabels=Array.from({length:yTicks+1},(_,i)=>minV+(range/yTicks)*i);
  return<svg viewBox={`0 0 ${w} ${height}`} style={{width:'100%',height:'auto',display:'block'}}>
    {yLabels.map((v,i)=>{const y=scY(v);return<g key={i}>
      <line x1={pad.l} x2={pad.l+iW} y1={y} y2={y} stroke={v===0?'#334155':'#1e293b'} strokeWidth={v===0?1.5:.5} strokeDasharray={v===0?'none':'3,3'}/>
      <text x={pad.l-6} y={y+4} textAnchor="end" fill={v===0?'#94a3b8':'#475569'} fontSize={9} fontFamily="Syne Mono">{v>=0?'+':''}{Math.round(v)}</text>
    </g>;})}
    <path d={fill} fill={lc} fillOpacity=".07"/>
    <path d={line} fill="none" stroke={lc} strokeWidth={2} strokeLinejoin="round"/>
    {curve.map((p,i)=>p.correct===false&&<circle key={i} cx={scX(i)} cy={scY(p.pnl)} r={2.5} fill={C.rose} opacity={.7}/>)}
    {curve.map((p,i)=>p.correct===true&&<circle key={i} cx={scX(i)} cy={scY(p.pnl)} r={2.5} fill={C.lime} opacity={.5}/>)}
    <circle cx={scX(curve.length-1)} cy={scY(lastV)} r={5} fill={lc}/>
    <text x={scX(curve.length-1)+8} y={scY(lastV)+4} fill={lc} fontSize={10} fontWeight="bold" fontFamily="Syne Mono">{lastV>=0?'+':''}{lastV.toFixed(0)}</text>
  </svg>;
}

// ── Calibration Chart ─────────────────────────────────────────
function CalibChart({buckets}){
  if(!buckets) return null;
  const valid=buckets.filter(b=>b.n>0&&b.actual!=null);
  if(valid.length<2) return<p style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono',padding:'1rem'}}>No hay suficientes datos por bucket</p>;
  const w=400,h=220,pad={l:40,r:20,t:14,b:30};
  const iW=w-pad.l-pad.r,iH=h-pad.t-pad.b;
  const scX=v=>pad.l+(v-50)/50*iW;
  const scY=v=>pad.t+iH-(v-40)/60*iH;
  return<svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:'auto'}}>
    {/* Grid */}
    {[50,60,70,80,90,100].map(v=><line key={v} x1={pad.l} x2={pad.l+iW} y1={scY(v)} y2={scY(v)} stroke="#1e293b" strokeWidth={.5}/>)}
    {[55,60,65,70,75,80,85,90].map(v=><line key={v} x1={scX(v)} x2={scX(v)} y1={pad.t} y2={pad.t+iH} stroke="#1e293b" strokeWidth={.5}/>)}
    {/* Perfect calibration line */}
    <line x1={scX(55)} y1={scY(55)} x2={scX(92)} y2={scY(92)} stroke="#334155" strokeWidth={1} strokeDasharray="4,4"/>
    <text x={scX(85)} y={scY(88)} fill="#475569" fontSize={9} fontFamily="Syne Mono">Perfecto</text>
    {/* Axes */}
    {[50,60,70,80,90,100].map(v=><text key={v} x={pad.l-6} y={scY(v)+4} textAnchor="end" fill="#475569" fontSize={8} fontFamily="Syne Mono">{v}%</text>)}
    {[55,65,75,85].map(v=><text key={v} x={scX(v)} y={pad.t+iH+14} textAnchor="middle" fill="#475569" fontSize={8} fontFamily="Syne Mono">{v}%</text>)}
    <text x={pad.l-30} y={pad.t+iH/2} textAnchor="middle" fill="#64748b" fontSize={9} fontFamily="Syne Mono" transform={`rotate(-90,${pad.l-30},${pad.t+iH/2})`}>Real</text>
    <text x={pad.l+iW/2} y={h-4} textAnchor="middle" fill="#64748b" fontSize={9} fontFamily="Syne Mono">Predicho</text>
    {/* Dots */}
    {valid.map((b,i)=>{const cx=scX(b.pred),cy=scY(b.actual),above=b.actual>=b.pred;
      return<g key={i}>
        <circle cx={cx} cy={cy} r={Math.min(12,Math.max(5,b.n/8))} fill={above?C.lime:C.rose} fillOpacity=".2" stroke={above?C.lime:C.rose} strokeWidth={1.5}/>
        <text x={cx} y={cy+4} textAnchor="middle" fill={above?C.lime:C.rose} fontSize={9} fontWeight="bold" fontFamily="Syne Mono">{b.actual}%</text>
        <text x={cx} y={cy+14} textAnchor="middle" fill="#64748b" fontSize={7} fontFamily="Syne Mono">n={b.n}</text>
      </g>;
    })}
  </svg>;
}

// ── SPAIN TIMEZONE HELPERS ───────────────────────────────────
// Spain: Europe/Madrid (CET UTC+1 / CEST UTC+2)
function toSpainDate(isoString) {
  // Returns "YYYY-MM-DD" in Spain local time
  const d = new Date(isoString);
  return d.toLocaleDateString('sv-SE', {timeZone:'Europe/Madrid'});
}
function toSpainTime(isoString) {
  const d = new Date(isoString);
  return d.toLocaleTimeString('es-ES', {
    hour:'2-digit', minute:'2-digit', timeZone:'Europe/Madrid'
  });
}
function toSpainDisplay(dateStr) {
  // dateStr = "YYYY-MM-DD", returns "Lun 24 May"
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'});
}
function spainToday() {
  return new Date().toLocaleDateString('sv-SE', {timeZone:'Europe/Madrid'});
}
function App(){

  const [oddsDebug,setOddsDebug]=useState(null); // debug info from fetchOddsTennis

  // Compute available dates and filter matches by selected date (Spain TZ)
  const availableDates = useMemo(()=>{
    if(!matches||matches.length===0) return [];
    const seen=new Set();
    for(const m of matches){
      if(m.commence_time) seen.add(toSpainDate(m.commence_time));
    }
    return [...seen].sort();
  },[matches]);

  // Auto-select today (or nearest future date) when dates load
  useEffect(()=>{
    if(availableDates.length===0) return;
    const today=spainToday();
    const pick=availableDates.find(d=>d>=today)||availableDates[0];
    setSelectedDate(pick);
  },[availableDates]);

  // Matches filtered to selected date in Spain TZ
  const filteredMatches = useMemo(()=>{
    if(!matches||!selectedDate) return matches||[];
    return matches.filter(m=>m.commence_time&&toSpainDate(m.commence_time)===selectedDate);
  },[matches,selectedDate]);

  useEffect(()=>{

    return()=>{alive=false;};

    {id:'backtest',icon:'🧪', label:'Backtest'},
  ];

  return<div style={{background:C.bg,minHeight:'100vh'}}>
    {/* ── MAIN HEADER ── */}
    <header style={{background:C.s1,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100,
      padding:'0 1rem',display:'flex',alignItems:'center',gap:10,minHeight:54,flexWrap:'nowrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <div style={{width:30,height:30,flexShrink:0}}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="30" height="30">
            <defs>
              <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#050810"/>
                <stop offset="100%" stopColor="#0c1225"/>
              </linearGradient>
              <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#a3e635"/>
                <stop offset="100%" stopColor="#22d3ee"/>
              </linearGradient>
            </defs>
            <rect width="64" height="64" rx="13" fill="url(#hbg)"/>
            <rect width="64" height="64" rx="13" fill="none" stroke="url(#hg1)" strokeWidth="2" opacity="0.5"/>
            <circle cx="32" cy="32" r="17" fill="none" stroke="url(#hg1)" strokeWidth="2.5"/>
            <path d="M15 32 Q32 13 49 32" fill="none" stroke="url(#hg1)" strokeWidth="2"/>
            <path d="M15 32 Q32 51 49 32" fill="none" stroke="#22d3ee" strokeWidth="2" opacity="0.75"/>
            <path d="M32 15 Q51 32 32 49" fill="none" stroke="#a3e635" strokeWidth="2" opacity="0.75"/>
            <circle cx="32" cy="32" r="5" fill="url(#hg1)"/>
            <path d="M45 11 L53 7 L51 16 Z" fill="#a3e635"/>
          </svg>
        </div>
        <span style={{fontFamily:'Syne',fontWeight:900,fontSize:17,letterSpacing:'-0.3px',whiteSpace:'nowrap'}}>
          Ace<span style={{color:C.lime}}>Bets</span>
          <span style={{fontSize:9,fontWeight:400,color:C.muted,marginLeft:5,fontFamily:'Syne Mono'}}>PRO</span>
        </span>
        <span style={{fontSize:8,fontWeight:700,color:C.lime,fontFamily:'Syne Mono',opacity:.7}}>© Jorge Albert</span>
      </div>
      {/* Desktop nav */}
      <nav id="desktop-nav" style={{display:'flex',gap:2,flexWrap:'wrap',marginLeft:8}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'5px 11px',borderRadius:6,border:'none',
            background:tab===t.id?C.lime+'22':'transparent',color:tab===t.id?C.lime:C.mutedL,
            fontWeight:700,fontSize:12,transition:'all .15s',display:'flex',gap:4,alignItems:'center',whiteSpace:'nowrap'}}>
            {t.icon} {t.label}
          </button>
        ))}
      </nav>
      <div className="header-pts" style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
        {atpData&&<span style={{fontFamily:'Syne Mono',fontSize:9,color:C.muted,lineHeight:1.6,textAlign:'right'}}>
          <div style={{color:C.sky}}>⬤ ATP {atpData.players?.length}</div>
          <div style={{color:C.rose}}>⬤ WTA {wtaData?.players?.length||0}</div>
        </span>}
        {filteredMatches&&<div style={{padding:'3px 8px',borderRadius:5,
          background:filteredMatches.length>0?C.lime+'22':C.border,border:`1px solid ${filteredMatches.length>0?C.lime+'44':C.border}`}}>
          <span style={{fontSize:9,fontWeight:700,fontFamily:'Syne Mono',color:filteredMatches.length>0?C.lime:C.mutedL,whiteSpace:'nowrap'}}>
            {filteredMatches.length>0?`${filteredMatches.length} partidos`:'Sin líneas'}
          </span>
        </div>}
      </div>
    </header>

    {/* ── MOBILE BOTTOM NAV ── */}
    <nav id="mobile-nav" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:200,
      background:C.s1,borderTop:`1px solid ${C.border}`,
      display:'flex',alignItems:'stretch',
      paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          gap:2,padding:'6px 2px',border:'none',background:'transparent',
          color:tab===t.id?C.lime:C.muted,minHeight:52,fontSize:9,fontWeight:tab===t.id?700:500,
          fontFamily:'DM Sans',transition:'color .15s',borderTop:`2px solid ${tab===t.id?C.lime:'transparent'}`}}>
          <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:9,letterSpacing:0}}>{t.label}</span>
        </button>
      ))}
    </nav>

    {/* ── DATE SELECTOR BAR (Spain TZ) — visible only in match/torneo tabs ── */}
    {!loading&&!err&&availableDates.length>0&&(tab==='torneos'||tab==='matches')&&(
      <div className="date-bar" style={{background:C.s2,borderBottom:`1px solid ${C.border}`,padding:'8px 1rem',
        display:'flex',alignItems:'center',gap:8,overflowX:'auto',position:'sticky',top:54,zIndex:90,
        WebkitOverflowScrolling:'touch'}}>
        {/* Clock Spain */}
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginRight:6,
          padding:'4px 10px',background:C.s1,borderRadius:6,border:`1px solid ${C.border}`}}>
          <span style={{fontSize:12}}>🇪🇸</span>
          <span style={{fontFamily:'Syne Mono',fontSize:10,color:C.lime,fontWeight:700}}>
            {new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'})}
          </span>
          <span style={{fontFamily:'Syne Mono',fontSize:9,color:C.muted}}>Madrid</span>
        </div>

        <div style={{width:1,height:20,background:C.border,flexShrink:0}}/>

        {/* Date pills */}
        {availableDates.map(d=>{
          const isToday=d===spainToday();
          const isSel=d===selectedDate;
          const cnt=(matches||[]).filter(m=>m.commence_time&&toSpainDate(m.commence_time)===d).length;
          return<button key={d} onClick={()=>setSelectedDate(d)} style={{
            padding:'5px 14px',borderRadius:20,flexShrink:0,
            border:`1px solid ${isSel?C.lime:isToday?C.lime+'55':C.border}`,
            background:isSel?C.lime+'22':isToday?C.lime+'0a':'transparent',
            color:isSel?C.lime:isToday?C.lime+'99':C.mutedL,
            fontWeight:isSel?700:500,fontSize:12,transition:'all .15s',
            display:'flex',alignItems:'center',gap:6,
          }}>
            {isToday&&<span style={{fontSize:9,fontWeight:700,color:C.lime}}>HOY</span>}
            <span>{toSpainDisplay(d)}</span>
            <span style={{fontFamily:'Syne Mono',fontSize:10,
              padding:'1px 6px',borderRadius:10,
              background:isSel?C.lime+'33':C.border,
              color:isSel?C.lime:C.muted}}>{cnt}</span>
          </button>;
        })}
      </div>
    )}

    {loading&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'calc(100vh - 54px)',padding:'2rem'}}>
      <div style={{width:50,height:50,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.lime}`,borderRadius:'50%',marginBottom:24}} className="spin"/>
      <p style={{fontFamily:'Syne Mono',fontSize:13,color:C.lime,marginBottom:10}}>{prog}</p>
      <div style={{width:320,height:6,background:C.border,borderRadius:3,overflow:'hidden',marginBottom:8}}>
        <div style={{width:pct+'%',height:'100%',background:`linear-gradient(90deg,${C.lime},${C.cyan})`,borderRadius:3,transition:'width .5s'}}/>
      </div>
      <p style={{fontFamily:'Syne Mono',fontSize:10,color:C.muted}}>{Math.round(pct)}%</p>
      <p style={{fontFamily:'Syne Mono',fontSize:10,color:C.muted,marginTop:14,textAlign:'center',lineHeight:1.9,maxWidth:400}}>
        Datos: Jeff Sackmann (tennis_atp/wta 2023–2025) · 100% reales<br/>
        Elo por superficie · Forma por superficie · Fatiga real · P(srv) reales
      </p>
    </div>}

    {err&&!loading&&<div style={{padding:'3rem',textAlign:'center'}}>
      <p style={{color:C.rose,fontFamily:'Syne Mono',fontSize:13,marginBottom:12}}>⚠️ {err}</p>
      <button onClick={()=>window.location.reload()} style={{padding:'8px 20px',background:C.lime+'22',border:`1px solid ${C.lime}`,borderRadius:6,color:C.lime,fontWeight:700}}>Reintentar</button>
    </div>}

    {!loading&&!err&&<main style={{maxWidth:1400,margin:'0 auto',padding:'1.25rem 1rem'}}>
      {tab==='torneos' &&<TorneosTab atpData={atpData} wtaData={wtaData} matches={filteredMatches} selectedDate={selectedDate} espnData={espnData}/>}
      {tab==='matches' &&<MatchesTab atpData={atpData} wtaData={wtaData} matches={filteredMatches} selectedDate={selectedDate}/>}
      {tab==='rankings'&&<RankingsTab atpData={atpData} wtaData={wtaData}/>}
      {tab==='compare' &&<CompareTab atpData={atpData} wtaData={wtaData}/>}
      {tab==='stats'   &&<StatsTab atpData={atpData} wtaData={wtaData}/>}
      {tab==='backtest'&&<BacktestTab/>}
    </main>}

    {!loading&&<footer style={{borderTop:`1px solid ${C.border}`,padding:'10px 1rem',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
      <span className="footer-copy" style={{fontFamily:'Syne Mono',fontSize:9,color:C.muted}}>
        AceBets Pro · Jeff Sackmann (tennis_atp/wta 2023-25) · Odds API · Solo fines educativos
      </span>
      <span className="footer-copy" style={{fontFamily:'Syne Mono',fontSize:9,color:C.muted}}>
        Top 300 ATP · Top 150 WTA · Elo surf · Forma surf · Fatiga real · P(srv) real
      </span>
      <span className="footer-copy" style={{fontFamily:'Syne Mono',fontSize:9,color:C.lime,fontWeight:700,width:'100%',textAlign:'center',marginTop:4}}>
        © 2025 Jorge Albert · Todos los derechos reservados · Prohibida su reproducción sin autorización
      </span>
    </footer>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
