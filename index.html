const {useState,useEffect,useMemo,useRef,useCallback}=React;

// ═══════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════
const C={
  bg:'var(--bg)',s1:'var(--s1)',s2:'var(--s2)',s3:'var(--s3)',
  border:'var(--border)',
  lime:'var(--lime)',cyan:'var(--cyan)',amber:'var(--amber)',
  rose:'var(--rose)',violet:'var(--violet)',emerald:'var(--emerald)',
  sky:'var(--sky)',orange:'var(--orange)',
  text:'var(--text)',muted:'var(--muted)',mutedL:'var(--mutedL)',
};
const SURF_CLR={Hard:C.sky,Clay:C.amber,Grass:C.emerald,Carpet:C.violet,Unknown:C.muted};
const SURF_ICO={Hard:'🔵',Clay:'🔴',Grass:'🟢',Carpet:'🟣',Unknown:'⚪'};

// Torneo level labels & colors
const LVL_LABEL={G:'Grand Slam',M:'Masters 1000',A:'ATP 500',D:'ATP 250',F:'Finals',C:'Challenger'};
const LVL_CLR={G:C.lime,M:C.amber,A:C.sky,D:C.violet,F:C.orange,C:C.mutedL};

// ═══════════════════════════════════════════
// CACHE
// ═══════════════════════════════════════════
const _cache={};
async function cfetch(url,ttl=86400000){
  const n=Date.now();
  if(_cache[url]&&n-_cache[url].t<ttl) return _cache[url].d;
  try{
    const r=await fetch(url);
    if(!r.ok) return null;
    const d=await r.text();
    _cache[url]={d,t:n};
    return d;
  }catch{return null;}
}

// ═══════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════
function parseCSV(txt){
  if(!txt) return [];
  const lines=txt.trim().split('\n');
  if(lines.length<2) return [];
  const hdr=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(l=>{
    const v=l.split(',');
    const row={};
    hdr.forEach((h,i)=>{row[h]=(v[i]||'').replace(/^"|"$/g,'').trim();});
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

// ═══════════════════════════════════════════
// ELO ENGINE
// ═══════════════════════════════════════════
const ELO0=1500;
const TOURNEY_K={G:32,M:24,A:16,D:8,F:28,C:12};
function eloExp(a,b){return 1/(1+Math.pow(10,(b-a)/400));}
function normSurf(s){
  if(!s) return 'Hard';
  const u=s.toUpperCase();
  if(u.includes('CLAY')) return 'Clay';
  if(u.includes('GRASS')) return 'Grass';
  if(u.includes('CARPET')) return 'Carpet';
  return 'Hard';
}
function getK(level,round){
  const base=TOURNEY_K[level]||12;
  if(round==='F') return base*1.5;
  if(round==='SF') return base*1.2;
  return base;
}

// Parse YYYYMMDD → Date
function parseDate(s){
  if(!s||s.length<8) return null;
  return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
}

// ═══════════════════════════════════════════
// BUILD ELO — with surface-specific form + fatigue tracking
// MEJORA 1: surface-specific form (not global)
// MEJORA 2: fatigue = real match count last 14 days
// ═══════════════════════════════════════════
function buildElo(matches){
  const R={};
  const ens=(id,name)=>{
    if(!R[id]) R[id]={
      id, name:name||'',
      overall:ELO0, Hard:ELO0, Clay:ELO0, Grass:ELO0, Carpet:ELO0,
      count:0, wins:0, losses:0,
      sc:{Hard:0,Clay:0,Grass:0,Carpet:0},  // surface count
      sw:{Hard:0,Clay:0,Grass:0,Carpet:0},  // surface wins
      // MEJORA 1: form per surface
      formAll:[], formHard:[], formClay:[], formGrass:[], formCarpet:[],
      // serve stats (winner stats)
      sv:{aces:0,df:0,svpt:0,fin:0,fwon:0,swon:0,bps:0,bpf:0,n:0},
      // serve stats (loser stats) — for return calculation
      svL:{aces:0,df:0,svpt:0,fin:0,fwon:0,swon:0,bps:0,bpf:0,n:0},
      ret:{bpw:0,bpf:0,n:0},
      // MEJORA 2: date log for fatigue
      datelog:[],
      lastDate:'',
    };
    if(name&&!R[id].name) R[id].name=name;
    return R[id];
  };

  for(const m of matches){
    const wId=m.winner_id, lId=m.loser_id;
    if(!wId||!lId) continue;
    const surf=normSurf(m.surface);
    const K=getK(m.tourney_level,m.round);
    const date=m.tourney_date||'';
    const w=ens(wId,m.winner_name||'');
    const l=ens(lId,m.loser_name||'');

    // Overall Elo
    const eo=eloExp(w.overall,l.overall);
    w.overall+=K*(1-eo); l.overall+=K*(0-eo);
    // Surface Elo
    const es=eloExp(w[surf],l[surf]);
    w[surf]+=K*(1-es); l[surf]+=K*(0-es);

    // Counts
    w.count++;w.wins++;w.sc[surf]++;w.sw[surf]++;
    l.count++;l.losses++;l.sc[surf]++;
    w.lastDate=date; l.lastDate=date;

    // MEJORA 1: surface-specific form (last 20 per surface, last 20 overall)
    w.formAll.push(1); if(w.formAll.length>20) w.formAll.shift();
    l.formAll.push(0); if(l.formAll.length>20) l.formAll.shift();
    const wSF='form'+surf, lSF='form'+surf;
    w[wSF].push(1); if(w[wSF].length>15) w[wSF].shift();
    l[lSF].push(0); if(l[lSF].length>15) l[lSF].shift();

    // MEJORA 2: datelog for fatigue (keep last 60 entries)
    if(date){ w.datelog.push(date); if(w.datelog.length>60) w.datelog.shift(); }
    if(date){ l.datelog.push(date); if(l.datelog.length>60) l.datelog.shift(); }

    // Serve stats (winner)
    if(m.w_svpt&&parseInt(m.w_svpt)>0){
      const s=w.sv;
      s.aces+=parseInt(m.w_ace||0); s.df+=parseInt(m.w_df||0);
      s.svpt+=parseInt(m.w_svpt||0); s.fin+=parseInt(m.w_1stIn||0);
      s.fwon+=parseInt(m.w_1stWon||0); s.swon+=parseInt(m.w_2ndWon||0);
      s.bps+=parseInt(m.w_bpSaved||0); s.bpf+=parseInt(m.w_bpFaced||0); s.n++;
      // return for loser
      l.ret.bpw+=parseInt(m.w_bpFaced||0)-parseInt(m.w_bpSaved||0);
      l.ret.bpf+=parseInt(m.w_bpFaced||0); l.ret.n++;
    }
    // Serve stats (loser) — stored separately
    if(m.l_svpt&&parseInt(m.l_svpt)>0){
      const s=l.svL;
      s.aces+=parseInt(m.l_ace||0); s.df+=parseInt(m.l_df||0);
      s.svpt+=parseInt(m.l_svpt||0); s.fin+=parseInt(m.l_1stIn||0);
      s.fwon+=parseInt(m.l_1stWon||0); s.swon+=parseInt(m.l_2ndWon||0);
      s.bps+=parseInt(m.l_bpSaved||0); s.bpf+=parseInt(m.l_bpFaced||0); s.n++;
      // return for winner
      w.ret.bpw+=parseInt(m.l_bpFaced||0)-parseInt(m.l_bpSaved||0);
      w.ret.bpf+=parseInt(m.l_bpFaced||0); w.ret.n++;
    }
  }
  return R;
}

// ═══════════════════════════════════════════
// DERIVE STATS
// ═══════════════════════════════════════════
function deriveStats(p,surf){
  // Combine winner + loser serve stats for more data
  const sw=p.sv, sl=p.svL;
  const totalSvpt=(sw.svpt||0)+(sl.svpt||0);
  const totalFin=(sw.fin||0)+(sl.fin||0);
  const totalFwon=(sw.fwon||0)+(sl.fwon||0);
  const totalSwon=(sw.swon||0)+(sl.swon||0);
  const totalBps=(sw.bps||0)+(sl.bps||0);
  const totalBpf=(sw.bpf||0)+(sl.bpf||0);
  const totalAces=(sw.aces||0)+(sl.aces||0);

  const fstIn  = totalSvpt>0   ? +(totalFin/totalSvpt*100).toFixed(1)   : null;
  const fstWon = totalFin>0    ? +(totalFwon/totalFin*100).toFixed(1)   : null;
  const sndWon = (totalSvpt-totalFin)>0 ? +(totalSwon/(totalSvpt-totalFin)*100).toFixed(1) : null;
  const bpSave = totalBpf>0    ? +(totalBps/totalBpf*100).toFixed(1)    : null;
  const acePct = totalSvpt>0   ? +(totalAces/totalSvpt*100).toFixed(1)  : null;
  const bpConv = p.ret.bpf>0  ? +(p.ret.bpw/p.ret.bpf*100).toFixed(1) : null;

  // MEJORA 1: surface-specific form
  const surfKey='form'+(surf||'All');
  const formSurf=p[surfKey]||[];
  const formAll=p.formAll||[];

  // MEJORA 2: fatigue — matches in last 14 days
  const now=Date.now();
  const fatigue14=(p.datelog||[]).filter(d=>{
    const dt=parseDate(d);
    return dt&&(now-dt.getTime())<14*86400000;
  }).length;
  const fatigueAdj=fatigue14>=5?-(fatigue14-4)*0.012:0; // penalty after 4 matches in 14 days

  return{
    fstIn,fstWon,sndWon,bpSave,acePct,bpConv,
    form5all:   formAll.slice(-5).reduce((a,b)=>a+b,0),
    form10all:  formAll.slice(-10).reduce((a,b)=>a+b,0),
    form5surf:  formSurf.slice(-5).reduce((a,b)=>a+b,0),
    form10surf: formSurf.length>=3?formSurf.slice(-10).reduce((a,b)=>a+b,0):null,
    surfSampleOk: formSurf.length>=5,
    fatigue14, fatigueAdj,
    // MEJORA 3: point probability from real serve/return stats
    pServeWon: (fstIn!=null&&fstWon!=null&&sndWon!=null)
      ? +((fstIn/100*fstWon/100 + (1-fstIn/100)*sndWon/100)*100).toFixed(2)
      : null,
  };
}

// ═══════════════════════════════════════════
// PREDICTION ENGINE — fully data-driven
// MEJORA 3: point probability from real stats
// ═══════════════════════════════════════════
function predictMatch(p1,p2,surface,h2h){
  if(!p1||!p2) return null;
  const surf=normSurf(surface);
  const d1=deriveStats(p1,surf);
  const d2=deriveStats(p2,surf);

  // ── Elo blend (surface-specific if enough data) ──────────────
  const eloOv=eloExp(p1.overall,p2.overall);
  const eloSf=eloExp(p1[surf]||ELO0,p2[surf]||ELO0);
  const sfCnt=(p1.sc[surf]||0)+(p2.sc[surf]||0);
  const sfW=Math.min(0.68,sfCnt/50*0.68);
  let prob=sfW*eloSf+(1-sfW)*eloOv;

  // ── MEJORA 1: surface-specific form adjustment ────────────────
  let formAdj=0;
  if(d1.surfSampleOk&&d2.surfSampleOk&&d1.form10surf!=null&&d2.form10surf!=null){
    // Use surface form when we have enough data (≥5 matches on surface)
    const f1=d1.form10surf/Math.min(10,p1['form'+surf]?.length||1);
    const f2=d2.form10surf/Math.min(10,p2['form'+surf]?.length||1);
    formAdj=(f1-f2)*0.09;
  } else {
    // Fallback to overall form
    const f1=d1.form10all/Math.max(1,Math.min(10,p1.formAll?.length||1));
    const f2=d2.form10all/Math.max(1,Math.min(10,p2.formAll?.length||1));
    formAdj=(f1-f2)*0.07;
  }
  prob+=formAdj;

  // ── H2H adjustment ────────────────────────────────────────────
  let h2hAdj=0;
  if(h2h&&(h2h.p1Wins+h2h.p2Wins)>=3){
    const r=h2h.p1Wins/(h2h.p1Wins+h2h.p2Wins);
    h2hAdj=(r-0.5)*0.06;
    prob+=h2hAdj;
  }

  // ── MEJORA 2: fatigue adjustment ──────────────────────────────
  const fatAdj=(d1.fatigueAdj||0)-(d2.fatigueAdj||0);
  prob+=fatAdj;

  // ── Rank adjustment ───────────────────────────────────────────
  let rankAdj=0;
  if(p1.rank&&p2.rank){
    const rd=(p2.rank-p1.rank)/600;
    rankAdj=Math.sign(rd)*Math.min(0.04,Math.abs(rd)*0.02);
    prob+=rankAdj;
  }

  prob=Math.min(0.94,Math.max(0.06,prob));

  // ── MEJORA 3: Monte Carlo with real point probabilities ───────
  // p_serve_won = firstIn% × firstWon% + (1-firstIn%) × secondWon%
  // If real stats available, use them; otherwise approximate from match win prob
  const pp1serve=d1.pServeWon!=null ? d1.pServeWon/100 : null;
  const pp2serve=d2.pServeWon!=null ? d2.pServeWon/100 : null;
  const mc=simMatch(prob,5000,pp1serve,pp2serve);

  // ── Confidence score ──────────────────────────────────────────
  let conf=60;
  if(p1.count>30&&p2.count>30) conf+=5;
  if(sfCnt>20) conf+=5;
  if(h2h&&(h2h.p1Wins+h2h.p2Wins)>=3) conf+=4;
  if(Math.abs(prob-0.5)>0.15) conf+=4;
  if(d1.pServeWon!=null&&d2.pServeWon!=null) conf+=4; // real point probs
  if(d1.surfSampleOk&&d2.surfSampleOk) conf+=3;        // surface form
  conf=Math.min(88,conf);

  return{
    p1:Math.round(prob*100), p2:Math.round((1-prob)*100),
    eloOv:Math.round(eloOv*100), eloSf:Math.round(eloSf*100),
    formAdj:Math.round(formAdj*100), sfW:Math.round(sfW*100),
    h2hAdj:Math.round(h2hAdj*100),
    fatAdj:Math.round(fatAdj*100),
    rankAdj:Math.round(rankAdj*100),
    fatigue1:d1.fatigue14, fatigue2:d2.fatigue14,
    usedSurfForm:d1.surfSampleOk&&d2.surfSampleOk,
    usedRealPP:d1.pServeWon!=null&&d2.pServeWon!=null,
    pp1serve:d1.pServeWon, pp2serve:d2.pServeWon,
    d1,d2,mc,conf,surf,
  };
}

// ═══════════════════════════════════════════
// MONTE CARLO — real point probabilities
// MEJORA 3: use pp1serve/pp2serve from real stats
// ═══════════════════════════════════════════
function simGame(pp){
  let a=0,b=0;
  for(let i=0;i<300;i++){
    if(Math.random()<pp) a++; else b++;
    if(a>=4&&a-b>=2) return 1;
    if(b>=4&&b-a>=2) return 0;
  }
  return Math.random()<pp?1:0;
}
function simTB(pp){
  let a=0,b=0;
  for(let i=0;i<200;i++){
    if(Math.random()<pp) a++; else b++;
    if(a>=7&&a-b>=2) return 1;
    if(b>=7&&b-a>=2) return 0;
  }
  return Math.random()<pp?1:0;
}
function simSet(pp1serve,pp2serve){
  // pp1serve = prob p1 wins a point on HIS serve
  // pp2serve = prob p2 wins a point on HIS serve
  let a=0,b=0,srv=true;
  for(let i=0;i<130;i++){
    // when p1 serves: pp1serve chance p1 wins point
    // when p2 serves: pp2serve chance p2 wins point = (1-pp2serve) for p1
    const pp=srv?pp1serve:(1-pp2serve);
    if(simGame(pp)) a++; else b++;
    srv=!srv;
    if(a>=6&&a-b>=2) return {w:1,g:a+b};
    if(b>=6&&b-a>=2) return {w:0,g:a+b};
    if(a===6&&b===6){
      const tbPP=(pp1serve+(1-pp2serve))/2;
      const tw=simTB(tbPP);
      return {w:tw,g:a+b+1};
    }
  }
  return {w:Math.random()<pp1serve?1:0,g:12};
}
function simMatch(matchWinProb,n=5000,pp1serve=null,pp2serve=null){
  // Convert match win prob → point probs if real stats not available
  // Empirical relationship: higher match win prob → higher serve point prob
  const approxPP=p=>Math.min(0.74,Math.max(0.26,0.5+(p-0.5)*0.38));
  const p1sp=pp1serve!=null?pp1serve:approxPP(matchWinProb);
  const p2sp=pp2serve!=null?pp2serve:approxPP(1-matchWinProb);

  let wins=0;
  let s20=0,s21=0,s02=0,s12=0;
  const games=[];
  for(let i=0;i<n;i++){
    let p1s=0,p2s=0,g=0;
    while(p1s<2&&p2s<2){
      const s=simSet(p1sp,p2sp);
      g+=s.g;
      if(s.w===1) p1s++; else p2s++;
    }
    games.push(g);
    if(p1s>p2s){wins++;if(p2s===0)s20++;else s21++;}
    else{if(p1s===0)s02++;else s12++;}
  }
  games.sort((a,b)=>a-b);
  const pw=wins/n;
  return{
    p1:+(pw*100).toFixed(1),p2:+((1-pw)*100).toFixed(1),
    med:games[Math.floor(n/2)],
    p10:games[Math.floor(n*0.1)],p90:games[Math.floor(n*0.9)],
    s20:+(s20/n*100).toFixed(1),s21:+(s21/n*100).toFixed(1),
    s02:+(s02/n*100).toFixed(1),s12:+(s12/n*100).toFixed(1),
    sig:Math.abs(pw-0.5)>0.10,
    realPP:pp1serve!=null,
  };
}

// ═══════════════════════════════════════════
// EDGE DETECTION
// ═══════════════════════════════════════════
function implProb(dec){return dec>1?+(1/dec*100).toFixed(1):null;}
function calcEdge(modelPct,dec){
  if(!modelPct||!dec||dec<=1) return null;
  const m=modelPct/100,impl=1/dec;
  const e=m-impl;
  return{
    edge:+(e*100).toFixed(1),impl:+(impl*100).toFixed(1),
    value:e>0.03,strong:e>0.06,
    kelly:e>0?+(e/impl*25).toFixed(1):0,
  };
}

async function loadData(tour,topN,onProg){
  const years=[2023,2024,2025];
  let all=[];
  for(let i=0;i<years.length;i++){
    onProg(`📥 ${tour} ${years[i]} (${i+1}/3)…`,(i+1)/years.length*38);
    const m=await fetchMatches(tour,years[i]);
    all.push(...m);
  }
  onProg(`🧮 Elo por superficie (${all.length.toLocaleString()} partidos)…`,43);
  const ratings=buildElo(all);

  onProg(`📋 Rankings actuales ${tour}…`,48);
  const rankings=await fetchRankings(tour);
  onProg(`👤 Perfiles jugadores…`,52);
  const meta=await fetchPlayersMeta(tour);
  const metaMap={};
  for(const p of meta) metaMap[p.player_id]=p;

  // ranking map
  const rankMap={};
  const seen=new Set();
  const sorted=[...rankings].sort((a,b)=>a.ranking_date<b.ranking_date?1:-1);
  for(const r of sorted){
    if(!seen.has(r.player)&&parseInt(r.rank)<=(topN+120)){
      rankMap[r.player]={rank:parseInt(r.rank),pts:parseInt(r.points||0)};
      seen.add(r.player);
    }
  }

  // h2h map
  const h2h={};
  for(const m of all){
    const w=m.winner_id,l=m.loser_id;
    if(!w||!l) continue;
    const k=[w,l].sort().join('_');
    if(!h2h[k]) h2h[k]={p1:w,p2:l,w1:0,w2:0,matches:[]};
    if(w===h2h[k].p1) h2h[k].w1++; else h2h[k].w2++;
    h2h[k].matches.push({date:m.tourney_date,surf:m.surface,round:m.round,score:m.score,winner:w,tourney:m.tourney_name});
  }

  // build tourney list from matches (for Torneos tab)
  const tourneyMap={};
  for(const m of all){
    const id=m.tourney_id||'';
    if(!id) continue;
    if(!tourneyMap[id]){
      tourneyMap[id]={
        id, name:m.tourney_name||id,
        date:m.tourney_date||'',
        surface:m.surface||'Hard',
        level:m.tourney_level||'',
        country:'',
      };
    }
    // keep most recent date
    if((m.tourney_date||'')>tourneyMap[id].date) tourneyMap[id].date=m.tourney_date;
  }

  onProg(`🔗 Combinando ${Object.keys(ratings).length} jugadores…`,58);
  const players=[];
  for(const [id,p] of Object.entries(ratings)){
    const rk=rankMap[id];
    if(!rk||rk.rank>topN) continue;
    const m=metaMap[id]||{};
    const name=p.name||`${m.name_first||''} ${m.name_last||''}`.trim()||`P${id}`;
    const surfs=['Hard','Clay','Grass','Carpet'];
    const bestSurf=surfs.reduce((a,b)=>(p[a]||0)>(p[b]||0)?a:b);
    players.push({
      id,name,rank:rk.rank,pts:rk.pts,
      country:m.ioc||'',hand:m.hand||'',height:m.height?parseInt(m.height):null,
      ...p, bestSurf,
      winPct:p.count>0?+(p.wins/p.count*100).toFixed(1):50,
    });
  }
  players.sort((a,b)=>a.rank-b.rank);
  return{players,h2h,tourneys:Object.values(tourneyMap),totalMatches:all.length};
}

// ═══════════════════════════════════════════
// PARTIDOS DEL DÍA — Odds API /events endpoint (sin cuotas, solo fixture)
// Funciona en file:// y https:// sin restricciones CORS
// ═══════════════════════════════════════════
async function fetchESPNToday(){
  const result={tournaments:{},errors:[]};
  const today=new Date().toLocaleDateString('sv-SE',{timeZone:'Europe/Madrid'});

  // Sofascore funciona desde https:// (GitHub Pages) — fuente principal
  try{
    const r=await fetch(
      `https://api.sofascore.com/api/v1/sport/tennis/scheduled-events/${today}`,
      {headers:{'Accept':'application/json'}}
    );
    if(!r.ok){
      result.errors.push(`Sofascore HTTP ${r.status}`);
    } else {
      const data=await r.json();
      const events=data.events||[];

      // Log categorías para debug
      const cats=new Map();
      for(const ev of events){
        const k=ev.tournament?.category?.id;
        if(!cats.has(k)) cats.set(k,{
          id:k,
          name:ev.tournament?.category?.name||'',
          slug:ev.tournament?.category?.slug||'',
          count:0
        });
        cats.get(k).count++;
      }
      console.log('📡 Sofascore categorías:', [...cats.values()]);

      // Excluir solo ITF — incluir ATP, WTA, dobles, 125s, todo lo tour
      const EXCL_SLUGS=['itf-men','itf-women'];
      const EXCL_NAMES=['itf'];

      for(const ev of events){
        const catName=(ev.tournament?.category?.name||'').toLowerCase();
        const catSlug=(ev.tournament?.category?.slug||'').toLowerCase();

        // Saltar ITF
        if(EXCL_SLUGS.some(x=>catSlug===x)||EXCL_NAMES.some(x=>catName===x)) continue;

        // Incluir ATP, WTA y también "Men" / "Women" que es como Sofascore
        // etiqueta Queens/Halle a veces
        const isWTA=catName.includes('wta')||catSlug.includes('wta')||
                    catName==='women'||catSlug==='women'||catSlug.includes('women');
        const isATP=catName.includes('atp')||catSlug.includes('atp')||
                    catName==='men'||catSlug==='men'||catSlug.includes('men');
        if(!isATP&&!isWTA) continue;

        const tourId=ev.tournament?.id;
        const tourName=ev.tournament?.name||'Unknown';
        const sport=isWTA?'WTA':'ATP';

        if(!result.tournaments[tourId]){
          result.tournaments[tourId]={
            id:tourId,name:tourName,sport,
            category:ev.tournament?.category?.name||sport,
            matches:[],
          };
        }
        result.tournaments[tourId].matches.push({
          id:`sf_${ev.id}`,
          _source:'sofascore',
          home_team:ev.homeTeam?.name||'',
          away_team:ev.awayTeam?.name||'',
          home_slug:ev.homeTeam?.slug||'',
          away_slug:ev.awayTeam?.slug||'',
          commence_time:ev.startTimestamp
            ?new Date(ev.startTimestamp*1000).toISOString()
            :today+'T12:00:00Z',
          sport_title:tourName,
          _sport:`tennis_${sport.toLowerCase()}`,
          status:ev.status?.type||'notstarted',
          bookmakers:[],
        });
      }
    }
  }catch(e){
    result.errors.push('Sofascore: '+e.message);
  }

  // Si Sofascore falla, intentar con Odds API /events como fallback
  if(Object.keys(result.tournaments).length===0){
    result.errors.push('Sofascore sin datos, intentando Odds API /events...');
    const KEY='507e497bc731d05e37c5ada9edcea593';
    const BASE='https://api.the-odds-api.com/v4';
    const tomorrow=new Date(Date.now()+86400000).toLocaleDateString('sv-SE',{timeZone:'Europe/Madrid'});
    try{
      const sr=await fetch(`${BASE}/sports/?apiKey=${KEY}`);
      if(sr.ok){
        const all=await sr.json();
        const active=all.filter(s=>s.group==='Tennis'&&s.active).map(s=>s.key);
        for(const sport of active){
          try{
            const r=await fetch(`${BASE}/sports/${sport}/events?apiKey=${KEY}&dateFormat=iso`);
            if(!r.ok) continue;
            const events=await r.json();
            if(!Array.isArray(events)) continue;
            const isWTA=sport.includes('wta');
            for(const ev of events.filter(e=>{const d=e.commence_time?.slice(0,10);return d===today||d===tomorrow;})){
              if(!result.tournaments[sport]) result.tournaments[sport]={
                id:sport,name:ev.sport_title||sport,sport:isWTA?'WTA':'ATP',category:isWTA?'WTA':'ATP',matches:[]
              };
              result.tournaments[sport].matches.push({
                id:`ev_${ev.id}`,_source:'odds_events',
                home_team:ev.home_team||'',away_team:ev.away_team||'',
                home_slug:'',away_slug:'',
                commence_time:ev.commence_time||new Date().toISOString(),
                sport_title:ev.sport_title||sport,_sport:sport,status:'notstarted',bookmakers:[],
              });
            }
          }catch(e){}
        }
      }
    }catch(e){result.errors.push('Odds fallback: '+e.message);}
  }

  const tourList=Object.values(result.tournaments);
  console.log('📡 Torneos del día:',tourList.length,'→',
    tourList.map(t=>`${t.sport} ${t.name}(${t.matches.length})`).join(' | '));
  window._espnResult=result;
  return result;
}

async function fetchOddsTennis(){
  const KEY='507e497bc731d05e37c5ada9edcea593';
  const BASE='https://api.the-odds-api.com/v4';
  const games=[];
  const _debug={sportsFound:[],sportsQueried:[],sportsWithGames:[],errors:[],totalRaw:0};

  // UNA SOLA llamada para descubrir sports activos — no malgastar quota
  // /sports/ NO cuenta como petición de quota (es gratis)
  let activeSports=[];
  try{
    const r=await fetch(`${BASE}/sports/?apiKey=${KEY}`);
    if(r.ok){
      const all=await r.json();
      const tennis=all.filter(s=>s.group==='Tennis');
      _debug.sportsFound=tennis.map(s=>({key:s.key,active:s.active,title:s.title}));
      // Solo los ACTIVOS — estos sí tienen partidos esta semana
      activeSports=tennis.filter(s=>s.active).map(s=>s.key);
      console.log('🎾 Sports activos esta semana:', activeSports);
    } else {
      _debug.errors.push(`sports HTTP ${r.status}`);
    }
  }catch(e){
    _debug.errors.push('sports: '+e.message);
  }

  // Fallback mínimo si /sports/ falla
  if(activeSports.length===0){
    activeSports=['tennis_atp','tennis_wta'];
  }
  _debug.sportsQueried=activeSports;

  // Una petición por sport activo (normalmente 1-4 en total, no 20+)
  for(const s of activeSports){
    try{
      const url=`${BASE}/sports/${s}/odds/?apiKey=${KEY}&regions=eu&markets=h2h&oddsFormat=decimal&dateFormat=iso`;
      const r=await fetch(url);
      if(!r.ok){
        _debug.errors.push(`${s}: HTTP ${r.status}`);
        continue;
      }
      const d=await r.json();
      if(Array.isArray(d)&&d.length>0){
        _debug.sportsWithGames.push({sport:s,count:d.length});
        d.forEach(g=>games.push({...g,_sport:s}));
      }
    }catch(e){
      _debug.errors.push(`${s}: ${e.message}`);
    }
  }

  _debug.totalRaw=games.length;

  // Deduplicar por id
  const seen=new Set();
  const result=games.filter(g=>{
    if(seen.has(g.id)) return false;
    seen.add(g.id);
    return true;
  });

  window._oddsDebug=_debug;
  console.log('🎾 Odds API:', activeSports.length,'sports activos,',result.length,'partidos');
  window._oddsMatches=result;
  return result;
}

        <Bar val={p.winPct||50} max={100} color={C.lime} h={4}/>
        <span style={{fontSize:7,color:C.lime,fontFamily:'Syne Mono',minWidth:26}}>{p.winPct||50}%</span>
      </div>
    </div>
    {d.fstWon!=null&&<div style={{marginTop:5,padding:'3px 6px',background:C.s1,borderRadius:4,
      display:'flex',gap:8,fontSize:8,fontFamily:'Syne Mono',color:C.mutedL}}>
      <span>1st:<span style={{color:C.sky}}>{d.fstWon}%</span></span>
      {d.bpSave!=null&&<span>BPsv:<span style={{color:d.bpSave>65?C.lime:C.amber}}>{d.bpSave}%</span></span>}
      {d.bpConv!=null&&<span>BPcv:<span style={{color:d.bpConv>40?C.lime:C.amber}}>{d.bpConv}%</span></span>}
      {d.fatigue14>3&&<span style={{color:C.orange}}>🏃{d.fatigue14}p/14d</span>}
    </div>}
  </div>;
}

// PLAYER DETAIL
// ═══════════════════════════════════════════
function PlayerDetail({p,allPlayers,h2hMap}){
  const [rivQ,setRivQ]=useState('');
  const [rival,setRival]=useState(null);
  const [surf,setSurf]=useState('Hard');
  const [showList,setShowList]=useState(false);
  if(!p) return null;
  const d=deriveStats(p,surf);

  const rivMatches=useMemo(()=>{
    if(!rival) return null;
    const k=[p.id,rival.id].sort().join('_');
    const raw=h2hMap[k];
    if(!raw) return null;
    const isFirst=raw.p1===p.id;
    return{p1w:isFirst?raw.w1:raw.w2,p2w:isFirst?raw.w2:raw.w1,matches:(raw.matches||[]).slice(-12).reverse()};
  },[p,rival,h2hMap]);

  const pred=useMemo(()=>rival?predictMatch(p,rival,surf,rivMatches?{p1Wins:rivMatches.p1w,p2Wins:rivMatches.p2w}:null):null,[p,rival,surf,rivMatches]);
  const rivResults=useMemo(()=>{
    if(!rivQ||rivQ.length<2) return [];
    return allPlayers.filter(x=>x.id!==p.id&&x.name?.toLowerCase().includes(rivQ.toLowerCase())).slice(0,6);
  },[rivQ,allPlayers,p]);

  return<div className="fade" style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
    <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:14}}>
      <div style={{flex:1}}>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
          <Flag cc={p.country} sz={20}/>
          <h2 style={{fontFamily:'Syne',fontWeight:900,fontSize:20}}>{p.name}</h2>
          <span style={{fontFamily:'Syne Mono',fontSize:13,color:C.amber}}>#{p.rank}</span>
          {p.pts>0&&<span style={{fontFamily:'Syne Mono',fontSize:10,color:C.amber}}>{p.pts.toLocaleString()}pts</span>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
          <SurfBadge surf={p.bestSurf}/>
          {p.hand&&<span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono',padding:'2px 7px',background:C.s2,borderRadius:4}}>{p.hand==='R'?'Diestro':'Zurdo'}</span>}
          {p.height&&<span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>{p.height}cm</span>}
          <span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>{p.wins}W-{p.losses}L ({p.winPct}%)</span>
          {d.fatigue14>0&&<span style={{fontSize:10,fontFamily:'Syne Mono',color:d.fatigue14>=5?C.rose:d.fatigue14>=3?C.orange:C.lime}}>
            🏃 {d.fatigue14} partidos últimos 14d
          </span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:C.mutedL}}>Forma (20):</span>
          <Dots form={p.formAll} max={20}/>
          <span style={{fontFamily:'Syne Mono',fontSize:10,color:C.lime}}>{d.form10all||0}/10</span>
        </div>
      </div>
    </div>

    {/* Elo Grid */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:12}}>
      {[['Overall',p.overall,C.lime],['Hard',p.Hard,C.sky],['Clay',p.Clay,C.amber],['Grass',p.Grass,C.emerald]].map(([l,v,c])=>(
        <div key={l} style={{background:C.s2,borderRadius:8,padding:'8px 10px',textAlign:'center',border:`1px solid ${l===p.bestSurf?c+'44':C.border}`}}>
          <p style={{margin:0,fontSize:8,color:C.mutedL,fontFamily:'Syne Mono',textTransform:'uppercase',letterSpacing:'1px'}}>{l}</p>
          <p style={{margin:'3px 0 1px',fontWeight:900,fontSize:20,color:c,fontFamily:'Syne',lineHeight:1}}>{Math.round(v||ELO0)}</p>
          <p style={{margin:0,fontSize:8,color:C.muted,fontFamily:'Syne Mono'}}>{p.sw[l]||0}W/{(p.sc[l]||0)-(p.sw[l]||0)}L</p>
        </div>
      ))}
    </div>

    {/* Surface form */}
    {['Hard','Clay','Grass'].some(s=>(p['form'+s]||[]).length>=3)&&(
      <div style={{background:C.s2,borderRadius:8,padding:'9px 12px',marginBottom:12}}>
        <p style={{margin:'0 0 7px',fontSize:9,fontWeight:700,color:C.violet,fontFamily:'Syne Mono',textTransform:'uppercase',letterSpacing:'1px'}}>📊 Forma por superficie (MEJORA 1)</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
          {['Hard','Clay','Grass'].map(s=>{
            const sf=p['form'+s]||[];
            if(sf.length<2) return<div key={s} style={{opacity:.3,fontSize:10,color:C.muted,fontFamily:'Syne Mono'}}>Sin datos {s}</div>;
            const w10=sf.slice(-10).reduce((a,b)=>a+b,0);

      <div style={{background:C.s2,borderRadius:8,padding:'9px 12px'}}>

        <StatRow label="1er srv In" val={d.fstIn} good={65} ok={58}/>
        <StatRow label="Pts 1er srv" val={d.fstWon} good={75} ok={68}/>
        <StatRow label="Pts 2do srv" val={d.sndWon} good={56} ok={48}/>
        <StatRow label="BP Salvados" val={d.bpSave} good={65} ok={55}/>
        <StatRow label="Aces/svpt" val={d.acePct} good={8} ok={4}/>
        {d.pServeWon!=null&&<StatRow label="P(srv won) real" val={d.pServeWon} unit="%" good={65} ok={58} color={C.lime}/>}
      </div>
      <div style={{background:C.s2,borderRadius:8,padding:'9px 12px'}}>
        <p style={{margin:'0 0 7px',fontSize:9,fontWeight:700,color:C.emerald,fontFamily:'Syne Mono',textTransform:'uppercase',letterSpacing:'1px'}}>🔄 Resto</p>
        <StatRow label="BP Convertidos" val={d.bpConv} good={42} ok={32}/>
        <StatRow label="Win% total" val={p.winPct} good={65} ok={55}/>
        <StatRow label="Forma L5 surf" val={d.form5surf!=null?d.form5surf/5*100:null} good={70} ok={50}/>
        <StatRow label="Forma L10 surf" val={d.form10surf!=null?d.form10surf/10*100:null} good={65} ok={50}/>
        <StatRow label="Partidos L14d" val={d.fatigue14} unit="" good={0} ok={3}
          color={d.fatigue14>=5?C.rose:d.fatigue14>=3?C.orange:C.lime}/>
      </div>
    </div>

    {/* Predicción vs Rival */}
    <div style={{background:C.s2,borderRadius:10,padding:'12px 14px'}}>
      <p style={{margin:'0 0 9px',fontSize:9,fontWeight:700,color:C.violet,fontFamily:'Syne Mono',textTransform:'uppercase',letterSpacing:'1px'}}>⚔️ Predicción vs rival</p>
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        {['Hard','Clay','Grass'].map(s=>(
          <button key={s} onClick={()=>setSurf(s)} style={{padding:'4px 10px',borderRadius:5,
            border:`1px solid ${surf===s?SURF_CLR[normSurf(s)]:C.border}`,
            background:surf===s?SURF_CLR[normSurf(s)]+'22':'transparent',
            color:surf===s?SURF_CLR[normSurf(s)]:C.mutedL,fontWeight:700,fontSize:11}}>
            {SURF_ICO[normSurf(s)]} {s}
          </button>
        ))}
      </div>
      <div style={{position:'relative',marginBottom:10}}>
        <input value={rivQ} onChange={e=>{setRivQ(e.target.value);setRival(null);setShowList(true);}}
          onFocus={()=>setShowList(true)}
          placeholder="🔍 Buscar rival..."
          style={{width:'100%',padding:'7px 10px',background:C.s1,border:`1px solid ${rival?C.lime:C.border}`,borderRadius:6,color:C.text,fontSize:12}}/>
        {showList&&rivResults.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,
          background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,zIndex:20,boxShadow:'0 8px 24px #000000aa',maxHeight:200,overflowY:'auto'}}>
          {rivResults.map(x=>(
            <div key={x.id} onClick={()=>{setRival(x);setRivQ(x.name);setShowList(false);}}
              style={{padding:'7px 12px',cursor:'pointer',display:'flex',gap:8,alignItems:'center',fontSize:12,borderBottom:`1px solid ${C.border}33`}}>
              <Flag cc={x.country}/><span style={{flex:1}}>{x.name}</span>
              <span style={{color:C.muted,fontFamily:'Syne Mono',fontSize:10}}>#{x.rank}</span>
            </div>
          ))}
        </div>}
      </div>
      {rivMatches&&<div style={{marginBottom:10,padding:'7px 10px',background:C.s1,borderRadius:7}}>
        <p style={{margin:'0 0 5px',fontSize:10,color:C.violet,fontFamily:'Syne Mono'}}>
          H2H: <span style={{color:C.lime,fontWeight:700}}>{p.name.split(' ').slice(-1)[0]} {rivMatches.p1w}</span>
          {' – '}
          <span style={{color:C.rose,fontWeight:700}}>{rivMatches.p2w} {rival?.name.split(' ').slice(-1)[0]}</span>
        </p>
        {rivMatches.matches.slice(0,5).map((m,i)=>(
          <div key={i} style={{display:'flex',gap:6,fontSize:10,color:C.mutedL,marginBottom:2,fontFamily:'Syne Mono',flexWrap:'wrap'}}>
            <span>{m.date}</span><SurfBadge surf={m.surf} sz={8}/><span>{m.round}</span>
            <span style={{flex:1,color:m.winner===p.id?C.lime:C.rose,fontWeight:700}}>{m.score}</span>

              border:`1px solid ${C[clr]}33`,borderRadius:8,padding:'10px',textAlign:'center'}}>

        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          {pred.usedRealPP&&<span style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:C.lime+'22',color:C.lime,fontFamily:'Syne Mono'}}>✅ P(srv) real</span>}
          {pred.usedSurfForm&&<span style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:C.sky+'22',color:C.sky,fontFamily:'Syne Mono'}}>✅ Forma superficie</span>}
          {(pred.fatigue1>3||pred.fatigue2>3)&&<span style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:C.orange+'22',color:C.orange,fontFamily:'Syne Mono'}}>⚠️ Fatiga detectada</span>}
        </div>
        {pred.mc&&<div style={{background:C.s1,borderRadius:7,padding:'8px 10px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4,textAlign:'center',marginBottom:6}}>
            {[['2-0',pred.mc.s20,C.lime],['2-1',pred.mc.s21,C.amber],['0-2',pred.mc.s02,C.rose],['1-2',pred.mc.s12,C.amber],['Games',pred.mc.med,C.violet]]
              .map(([l,v,c])=><div key={l}>
                <p style={{margin:0,fontSize:8,color:C.muted,fontFamily:'Syne Mono'}}>{l}</p>
                <p style={{margin:'2px 0 0',fontWeight:900,fontSize:14,color:c,fontFamily:'Syne',lineHeight:1}}>{v}{l!=='Games'?'%':''}</p>
              </div>)}
          </div>
          <p style={{margin:0,fontSize:9,color:C.muted,fontFamily:'Syne Mono',textAlign:'center'}}>
            Conf: <span style={{color:C.lime}}>{pred.conf}%</span>
            {' · '}Elo surf:{pred.eloSf}% · Forma:{pred.formAdj>0?'+':''}{pred.formAdj}%
            {pred.fatAdj!==0&&<span style={{color:C.orange}}> · Fat:{pred.fatAdj>0?'+':''}{pred.fatAdj}%</span>}
            {pred.h2hAdj!==0&&<span> · H2H:{pred.h2hAdj>0?'+':''}{pred.h2hAdj}%</span>}
          </p>
          {pred.mc.sig&&<p style={{margin:'4px 0 0',fontSize:9,color:C.lime,fontFamily:'Syne Mono',textAlign:'center'}}>✅ Señal clara (&gt;10% del 50%)</p>}
          {pred.mc.realPP&&<p style={{margin:'2px 0 0',fontSize:9,color:C.lime,fontFamily:'Syne Mono',textAlign:'center'}}>📡 MC con probabilidades de punto reales</p>}
        </div>}
      </div>}
    </div>
  </div>;

// MATCH CARD
// ═══════════════════════════════════════════
function MatchCard({match,atpPlayers,wtaPlayers}){
  const all=[...(atpPlayers||[]),...(wtaPlayers||[])];
  const home=match.home_team, away=match.away_team;
  const books=match.bookmakers||[];
  let hOdds=null,aOdds=null,bkName='';
  const pref=['pinnacle','bet365','unibet','betfair','draftkings','williamhill'];
  for(const bk of [...pref.map(k=>books.find(b=>b.key===k)),...books].filter(Boolean)){
    const mkt=bk.markets?.find(m=>m.key==='h2h');
    if(!mkt) continue;
    const ho=mkt.outcomes?.find(o=>o.name===home);
    const ao=mkt.outcomes?.find(o=>o.name===away);
    if(ho&&ao){hOdds=ho.price;aOdds=ao.price;bkName=bk.title||bk.key;break;}
  }
  const tName=(match.sport_title||match._sport||'').toLowerCase();
  const surface=tName.includes('clay')||tName.includes('roland')||tName.includes('french')?'Clay':
                tName.includes('wimbledon')||tName.includes('grass')?'Grass':'Hard';
  const findP=name=>{
    if(!name) return null;
    const nl=name.toLowerCase();
    return all.find(p=>{
      const pn=p.name?.toLowerCase()||'';
      return pn===nl||pn.includes(nl)||nl.includes(pn)||nl.split(' ').some(pt=>pt.length>3&&pn.includes(pt));
    });
  };
  const p1=findP(home), p2=findP(away);
  const pred=p1&&p2?predictMatch(p1,p2,surface,null):null;
  const hEdge=pred&&hOdds?calcEdge(pred.p1,hOdds):null;
  const aEdge=pred&&aOdds?calcEdge(pred.p2,aOdds):null;
  const bestEdge=hEdge&&aEdge?(hEdge.edge>aEdge.edge?hEdge:aEdge):(hEdge||aEdge);
  const winner=pred?(pred.p1>pred.p2?home:away):null;
  const winnerProb=pred?Math.max(pred.p1,pred.p2):null;
  const dt=new Date(match.commence_time);
  const hora=toSpainTime(match.commence_time);
  const isLive=dt<new Date()&&dt>new Date(Date.now()-5*3600000);

  return<div className="fade" style={{background:C.s1,border:`2px solid ${bestEdge?.strong?C.lime:bestEdge?.value?C.lime+'55':C.border}`,
    borderRadius:12,padding:14,marginBottom:10}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:10,color:C.muted,fontFamily:'Syne Mono'}}>{hora} 🇪🇸</span>
        {isLive&&<span style={{fontSize:8,fontWeight:700,padding:'1px 6px',borderRadius:3,background:C.rose+'33',color:C.rose,fontFamily:'Syne Mono'}}>● LIVE</span>}
        <span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>{match.sport_title||''}</span>
        <SurfBadge surf={surface} sz={9}/>
      </div>
      {bestEdge?.value&&<div style={{padding:'3px 10px',borderRadius:4,background:bestEdge.strong?C.lime+'22':C.lime+'11',border:`1px solid ${C.lime}44`}}>
        <span style={{fontSize:9,fontWeight:700,color:C.lime,fontFamily:'Syne Mono'}}>
          {bestEdge.strong?'🔥 EDGE FUERTE':'✅ VALOR'} +{bestEdge.edge}% · Kelly {bestEdge.kelly}%
        </span>
      </div>}
    </div>

    <div className="match-grid" style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8,alignItems:'center',marginBottom:8}}>
      {/* P1 */}
      <div style={{background:C.s2,borderRadius:8,padding:'10px 12px'}}>
        <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:3}}>
          {p1&&<Flag cc={p1.country} sz={12}/>}
          <span style={{fontWeight:700,fontSize:13}}>{home}</span>
        </div>
        {p1&&<div style={{marginBottom:3}}>
          <span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>#{p1.rank} · Elo:{Math.round(p1[normSurf(surface)]||p1.overall)}</span>
          <div style={{marginTop:3}}><Dots form={p1.formAll} max={8}/></div>
        </div>}
        {hOdds&&<div style={{marginTop:5,display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:14,fontFamily:'Syne Mono',fontWeight:700,color:hEdge?.value?C.lime:C.text}}>{hOdds.toFixed(2)}</span>
          <span style={{fontSize:10,color:C.muted,fontFamily:'Syne Mono'}}>{implProb(hOdds)}%</span>
          {hEdge&&<span style={{fontSize:10,fontFamily:'Syne Mono',fontWeight:700,color:hEdge.value?C.lime:C.rose}}>
            {hEdge.edge>0?'+':''}{hEdge.edge}%
          </span>}
        </div>}
      </div>

      {/* VS center */}
      <div style={{textAlign:'center',padding:'0 4px',minWidth:60}}>
        {pred?<div>
          <div style={{fontFamily:'Syne Mono',fontSize:13,fontWeight:700,color:pred.p1>=pred.p2?C.lime:C.mutedL}}>{pred.p1}%</div>
          <div style={{height:1,background:C.border,width:40,margin:'4px auto'}}/>
          <div style={{fontFamily:'Syne Mono',fontSize:13,fontWeight:700,color:pred.p2>pred.p1?C.lime:C.mutedL}}>{pred.p2}%</div>
          <div style={{fontSize:9,color:C.muted,fontFamily:'Syne Mono',marginTop:3}}>{pred.conf}%</div>
        </div>:<span style={{fontSize:16,color:C.muted}}>vs</span>}
      </div>

      {/* P2 */}
      <div style={{background:C.s2,borderRadius:8,padding:'10px 12px'}}>
        <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:3}}>
          {p2&&<Flag cc={p2.country} sz={12}/>}
          <span style={{fontWeight:700,fontSize:13}}>{away}</span>
        </div>
        {p2&&<div style={{marginBottom:3}}>
          <span style={{fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>#{p2.rank} · Elo:{Math.round(p2[normSurf(surface)]||p2.overall)}</span>
          <div style={{marginTop:3}}><Dots form={p2.formAll} max={8}/></div>
        </div>}
        {aOdds&&<div style={{marginTop:5,display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:14,fontFamily:'Syne Mono',fontWeight:700,color:aEdge?.value?C.lime:C.text}}>{aOdds.toFixed(2)}</span>
          <span style={{fontSize:10,color:C.muted,fontFamily:'Syne Mono'}}>{implProb(aOdds)}%</span>
          {aEdge&&<span style={{fontSize:10,fontFamily:'Syne Mono',fontWeight:700,color:aEdge.value?C.lime:C.rose}}>
            {aEdge.edge>0?'+':''}{aEdge.edge}%
          </span>}
        </div>}
      </div>
    </div>

    {/* WINNER PICK BOX */}
    {pred&&<div style={{marginBottom:8}}>
      <div style={{
        background:`linear-gradient(135deg,${pred.p1>pred.p2?C.lime:C.rose}18,${C.s2})`,
        border:`2px solid ${pred.p1>pred.p2?C.lime:C.rose}66`,
        borderRadius:8,padding:'10px 16px',marginBottom:6,
        display:'flex',alignItems:'center',gap:12,
      }}>
        <span style={{fontSize:22}}>🏆</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:9,color:C.muted,fontFamily:'Syne Mono',textTransform:'uppercase',letterSpacing:'1px'}}>
            PICK DEL MODELO — GANADOR PREDICHO
          </p>
          <p style={{margin:'3px 0 0',fontWeight:900,fontSize:20,fontFamily:'Syne',lineHeight:1,
            color:pred.p1>pred.p2?C.lime:C.rose}}>
            {winner}
          </p>
          <p style={{margin:'2px 0 0',fontSize:10,color:C.mutedL,fontFamily:'Syne Mono'}}>
            {pred.p1>pred.p2?away:home} tiene {Math.min(pred.p1,pred.p2)}% de ganar
          </p>
        </div>
        <div style={{textAlign:'right'}}>
          <p style={{margin:0,fontWeight:900,fontSize:32,fontFamily:'Syne',lineHeight:1,
            color:pred.p1>pred.p2?C.lime:C.rose}}>{winnerProb}%</p>
          <p style={{margin:'2px 0 0',fontSize:9,color:C.muted,fontFamily:'Syne Mono'}}>confianza {pred.conf}%</p>
        </div>
      </div>
      {/* MC row */}
      {pred.mc&&<div className="mc-row" style={{background:C.s2,borderRadius:7,padding:'7px 10px',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:9,color:C.muted,fontFamily:'Syne Mono'}}>MC 5k{pred.mc.realPP?' 📡real':' ~approx'}:</span>
        <span style={{fontSize:10,fontFamily:'Syne Mono',color:C.lime}}>2-0: {pred.mc.s20}%</span>
        <span style={{fontSize:10,fontFamily:'Syne Mono',color:C.amber}}>2-1: {pred.mc.s21}%</span>
        <span style={{fontSize:10,fontFamily:'Syne Mono',color:C.rose}}>0-2: {pred.mc.s02}%</span>
        <span style={{fontSize:10,fontFamily:'Syne Mono',color:C.violet}}>Games: {pred.mc.med} ({pred.mc.p10}-{pred.mc.p90})</span>
        {pred.mc.sig&&<span style={{fontSize:9,color:C.lime,fontFamily:'Syne Mono'}}>✅ señal clara</span>}
        {pred.usedSurfForm&&<span style={{fontSize:9,color:C.sky,fontFamily:'Syne Mono'}}>📊 forma surf</span>}
        {(pred.fatigue1>3||pred.fatigue2>3)&&<span style={{fontSize:9,color:C.orange,fontFamily:'Syne Mono'}}>⚠️ fatiga</span>}
      </div>}
    </div>}
  </div>;
}

// TAB: TORNEOS DEL DÍA
// ═══════════════════════════════════════════
function TorneosTab({atpData,wtaData,matches,espnData}){
  const [tour,setTour]=useState('both');
  const [selectedTourney,setSelectedTourney]=useState(null);

  const allPlayers=useMemo(()=>[...(atpData?.players||[]),...(wtaData?.players||[])],[atpData,wtaData]);
  const findP=useCallback(name=>{
    if(!name) return null;
    const nl=name.toLowerCase();
    return allPlayers.find(p=>{
      const pn=p.name?.toLowerCase()||'';
      return pn===nl||pn.includes(nl)||nl.includes(pn)||
        nl.split(' ').some(pt=>pt.length>3&&pn.includes(pt));
    });
  },[allPlayers]);

  function determineSurface(name){
    const n=(name||'').toLowerCase();
    if(n.includes('clay')||n.includes('roland')||n.includes('french')||n.includes('barcelona')||n.includes('madrid')||n.includes('rome')||n.includes('monte')) return 'Clay';
    if(n.includes('wimbledon')||n.includes('grass')||n.includes('halle')||n.includes('queens')||n.includes('queen')||
       n.includes('stuttgart')||n.includes('hertogenbosch')||n.includes('rosmalen')||n.includes('eastbourne')||n.includes('birmingham')||n.includes('boss open')) return 'Grass';
    return 'Hard';
  }
  function determineLevel(name){
    const n=(name||'').toLowerCase();
    if(n.includes('french open')||n.includes('roland')||n.includes('wimbledon')||n.includes('us open')||n.includes('australian')) return 'Grand Slam';
    if(n.includes('masters 1000')||n.includes('atp masters')||n.includes('1000')) return 'Masters 1000';
    if(n.includes('wta 1000')) return 'WTA 1000';
    if(n.includes('queens')||n.includes('halle')||n.includes('500')) return 'ATP 500';
    if(n.includes('wta 500')||n.includes('eastbourne')||n.includes('birmingham')) return 'WTA 500';
    if(n.includes('250')||n.includes('hertogenbosch')||n.includes('rosmalen')||n.includes('stuttgart')||n.includes('boss open')) return 'ATP 250';
    if(n.includes('wta 250')) return 'WTA 250';
    return 'Tour';
  }

  // Build tourney map from API matches (with odds)
  const oddsMap=useMemo(()=>{
    const map={};
    if(!matches||matches.length===0) return map;
    for(const m of matches){
      const isWTA=m._sport?.includes('wta');
      const title=m.sport_title||m._sport||'Unknown';
      const tourKey=m.competition_id||(()=>{
        const parts=title.split(' - ');
        return parts.length>1?parts.slice(1).join('-').trim()+'::'+m._sport:m._sport||'unknown';
      })();
      const surf=determineSurface(title+' '+(m._sport||''));
      if(!map[tourKey]) map[tourKey]={
        key:tourKey, name:title, sport:isWTA?'WTA':'ATP',
        surface:surf, matches:[], level:determineLevel(title), edgeCount:0, hasOdds:true,
      };
      const books=m.bookmakers||[];
      let hOdds=null,aOdds=null;
      for(const bk of books){
        const mkt=bk.markets?.find(x=>x.key==='h2h');
        if(!mkt) continue;
        const ho=mkt.outcomes?.find(o=>o.name===m.home_team);
        const ao=mkt.outcomes?.find(o=>o.name===m.away_team);
        if(ho&&ao){hOdds=ho.price;aOdds=ao.price;break;}
      }
      const p1=findP(m.home_team),p2=findP(m.away_team);
      if(p1&&p2&&hOdds&&aOdds){
        const pred=predictMatch(p1,p2,surf,null);
        if(pred){
          const hEdge=pred.p1/100-1/hOdds;
          const aEdge=pred.p2/100-1/aOdds;
          if(hEdge>0.03||aEdge>0.03) map[tourKey].edgeCount++;
        }
      }
      map[tourKey].matches.push(m);
    }
    return map;
  },[matches,findP]);

  // Merge: Odds API (con cuotas) + Sofascore (partidos reales del día sin cuotas)
  const todayTourneys=useMemo(()=>{
    const result=[];
    // 1. Torneos con cuotas reales (Odds API)
    for(const t of Object.values(oddsMap)) result.push(t);

    // 2. Torneos de Sofascore — partidos reales, sin cuotas
    if(espnData?.tournaments){
      function isAlreadyCovered(tourName,sport){
        const n=tourName.toLowerCase();
        return result.some(t=>{
          if(t.sport!==sport) return false;
          const tn=t.name.toLowerCase();
          // Match if they share at least one significant word (>4 chars)
          return n.split(/\s+/).some(w=>w.length>4&&tn.includes(w));
        });
      }
      for(const sfTour of Object.values(espnData.tournaments)){
        if(isAlreadyCovered(sfTour.name,sfTour.sport)) continue;
        const surf=determineSurface(sfTour.name+' '+sfTour.category);
        const realMatches=sfTour.matches.map(m=>{
          const p1=findP(m.home_team)||findP((m.home_slug||'').replace(/-/g,' '));
          const p2=findP(m.away_team)||findP((m.away_slug||'').replace(/-/g,' '));
          return{...m,_p1resolved:p1,_p2resolved:p2};
        });
        // Only show tourney if at least some players could be resolved
        const resolved=realMatches.filter(m=>m._p1resolved||m._p2resolved);
        if(resolved.length===0&&realMatches.length>0){
          // Keep anyway but flag as unresolved
          result.push({
            key:`sf_${sfTour.id}`,name:sfTour.name,sport:sfTour.sport,
            surface:surf,level:determineLevel(sfTour.name),
            matches:realMatches,edgeCount:0,hasOdds:false,_source:'espn',
            _unresolved:true,
          });
        } else if(realMatches.length>0){
          result.push({
            key:`sf_${sfTour.id}`,name:sfTour.name,sport:sfTour.sport,
            surface:surf,level:determineLevel(sfTour.name),
            matches:realMatches,edgeCount:0,hasOdds:false,_source:'espn',
          });
        }
      }
    }
    return result.sort((a,b)=>{
      const lo={'Grand Slam':0,'Masters 1000':1,'WTA 1000':1,'ATP 500':2,'WTA 500':2,'ATP 250':3,'WTA 250':3};
      return (lo[a.level]||9)-(lo[b.level]||9);
    });
  },[oddsMap,espnData,findP,atpData,wtaData]);

  // FALLBACK: si no hay ningún torneo de API ni ESPN, usar calendario hardcoded
  const calendarFallbackTourneys=useMemo(()=>{
    if(todayTourneys.length>0) return todayTourneys;
    const cal=getActiveCalendarTourneys();
    if(cal.length===0) return [];
    return cal.map(c=>{
      const players=(c.sport==='WTA'?wtaData:atpData)?.players||[];
      const surf=c.surface;
      // Top players seeded realistically: 1v16, 2v15, etc.
      const top=players.filter(p=>p.rank&&p.rank<=64).sort((a,b)=>a.rank-b.rank).slice(0,16);
      const matches=[];
      for(let i=0;i<Math.floor(top.length/2)&&matches.length<8;i++){
        const p1=top[i], p2=top[top.length-1-i];
        if(p1&&p2) matches.push({
          id:`cal_${c.key}_${i}`,_synthetic:true,
          home_team:p1.name,away_team:p2.name,
          _p1resolved:p1,_p2resolved:p2,
          sport_title:c.name,_sport:`tennis_${c.sport.toLowerCase()}`,
          commence_time:new Date().toISOString(),bookmakers:[],status:'notstarted',
        });
      }
      return{
        key:c.key,name:c.name,sport:c.sport,
        surface:surf,level:c.level,
        matches,edgeCount:0,hasOdds:false,_source:'calendar',
      };
    }).filter(t=>t.matches.length>0)
      .sort((a,b)=>{
        const lo={'Grand Slam':0,'Masters 1000':1,'WTA 1000':1,'ATP 500':2,'WTA 500':2,'ATP 250':3,'WTA 250':3};
        return (lo[a.level]||9)-(lo[b.level]||9);
      });
  },[todayTourneys,atpData,wtaData]);

  const allTourneys=todayTourneys.length>0?todayTourneys:calendarFallbackTourneys;

  const filtered=useMemo(()=>{
    const src=allTourneys;
    if(tour==='both') return src;
    return src.filter(t=>t.sport===tour);
  },[allTourneys,tour]);

  const selectedMatches=useMemo(()=>{
    if(!selectedTourney) return null;
    return selectedTourney.matches;
  },[selectedTourney]);

  if(!matches) return<div style={{textAlign:'center',padding:'4rem'}}>
    <div style={{width:36,height:36,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.lime}`,borderRadius:'50%',margin:'0 auto 16px'}} className="spin"/>
    <p style={{color:C.lime,fontFamily:'Syne Mono',fontSize:13}}>Cargando torneos…</p>
  </div>;

  if(allTourneys.length===0){
    const dbg=window._oddsDebug||null;
    const allMatchesCount=(matches||[]).length;

    // Diagnóstico rápido inline sin recargar
    const [probing,setProbing]=useState(false);
    const [probeResult,setProbeResult]=useState(null);
    const runProbe=async()=>{
      setProbing(true);
      try{
        const KEY='507e497bc731d05e37c5ada9edcea593';
        const r=await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${KEY}`);
        const status=r.status;
        if(!r.ok){const t=await r.text();setProbeResult({ok:false,status,body:t.slice(0,300)});setProbing(false);return;}
        const all=await r.json();
        const tennis=all.filter(s=>s.group==='Tennis');
        const active=tennis.filter(s=>s.active);
        setProbeResult({ok:true,status,total:all.length,tennis:tennis.length,active:active.length,
          activeSports:active.map(s=>s.key),
          inactiveTennis:tennis.filter(s=>!s.active).map(s=>s.key),
        });
      }catch(e){setProbeResult({ok:false,status:'error',body:e.message});}
      setProbing(false);
    };

    return<div style={{padding:'2rem 1rem',maxWidth:720,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:20}}>
        <p style={{fontSize:44,marginBottom:8}}>🏟️</p>
        <p style={{color:C.mutedL,fontFamily:'Syne Mono',fontSize:13,lineHeight:2}}>
          No hay torneos activos hoy con líneas disponibles<br/>
          <span style={{color:C.muted,fontSize:11}}>Las líneas aparecen durante semanas de torneos ATP/WTA<br/>(Roland Garros, Wimbledon, US Open, Masters 1000…)</span>
        </p>
      </div>

      {/* Panel diagnóstico */}
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:16,fontFamily:'Syne Mono',fontSize:11}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{color:C.amber,fontWeight:700,fontSize:12}}>🔍 Diagnóstico Odds API</span>
          <button onClick={runProbe} disabled={probing} style={{
            padding:'5px 14px',borderRadius:6,border:`1px solid ${C.lime}44`,
            background:C.lime+'18',color:C.lime,fontSize:10,fontWeight:700,cursor:'pointer'}}>
            {probing?'Consultando…':'▶ Test API ahora'}
          </button>
        </div>

        {/* Info de la última carga */}
        <div style={{background:C.s2,borderRadius:8,padding:'10px 12px',marginBottom:12}}>
          <p style={{color:C.muted,fontSize:10,marginBottom:6}}>Última carga de página:</p>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <span>Partidos totales: <span style={{color:allMatchesCount>0?C.lime:C.rose,fontWeight:700}}>{allMatchesCount}</span></span>
            {dbg&&<>
              <span>Sports tenis encontrados: <span style={{color:dbg.sportsFound?.length>0?C.lime:C.rose,fontWeight:700}}>{dbg.sportsFound?.length||0}</span></span>
              <span>Sports activos: <span style={{color:(dbg.sportsFound?.filter(s=>s.active)||[]).length>0?C.lime:C.rose,fontWeight:700}}>{(dbg.sportsFound?.filter(s=>s.active)||[]).length}</span></span>
              <span>Con cuotas: <span style={{color:dbg.sportsWithGames?.length>0?C.lime:C.rose,fontWeight:700}}>{dbg.sportsWithGames?.length||0}</span></span>
            </>}
          </div>
          {dbg?.errors?.length>0&&<div style={{marginTop:8}}>
            {dbg.errors.map((e,i)=><div key={i} style={{color:C.rose,fontSize:10,marginTop:2}}>⚠️ {e}</div>)}
          </div>}
          {dbg?.sportsWithGames?.length>0&&<div style={{marginTop:8}}>
            {dbg.sportsWithGames.map(s=><div key={s.sport} style={{color:C.lime,fontSize:10,marginTop:2}}>✅ {s.sport}: {s.count} partidos</div>)}
          </div>}
          {dbg?.sportsFound?.length>0&&<div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
            {dbg.sportsFound.map(s=>(
              <span key={s.key} style={{fontSize:9,padding:'2px 6px',borderRadius:4,
                background:s.active?C.lime+'22':C.s3,
                color:s.active?C.lime:C.muted,border:`1px solid ${s.active?C.lime+'33':C.border}`}}>
                {s.active?'●':'○'} {s.key}
              </span>
            ))}
          </div>}
        </div>

        {/* Resultado del probe en vivo */}
        {probeResult&&<div style={{background:probeResult.ok?C.lime+'0a':C.rose+'0a',border:`1px solid ${probeResult.ok?C.lime+'33':C.rose+'33'}`,borderRadius:8,padding:'10px 12px'}}>
          <p style={{color:probeResult.ok?C.lime:C.rose,fontWeight:700,marginBottom:8,fontSize:11}}>
            {probeResult.ok?'✅ API accesible':'❌ Error de API'} · HTTP {probeResult.status}
          </p>
          {probeResult.ok?<>
            <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:8}}>
              <span>Total sports: <span style={{color:C.sky,fontWeight:700}}>{probeResult.total}</span></span>
              <span>Sports tenis: <span style={{color:C.sky,fontWeight:700}}>{probeResult.tennis}</span></span>
              <span>Tenis activos: <span style={{color:probeResult.active>0?C.lime:C.rose,fontWeight:700}}>{probeResult.active}</span></span>
            </div>
            {probeResult.active>0?<>
              <p style={{color:C.lime,marginBottom:6}}>Sports activos ahora mismo:</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {probeResult.activeSports.map(k=>(
                  <span key={k} style={{fontSize:9,padding:'3px 8px',borderRadius:4,background:C.lime+'22',color:C.lime,border:`1px solid ${C.lime+'44'}`}}>✅ {k}</span>
                ))}
              </div>
            </>:<>
              <p style={{color:C.amber,marginBottom:6}}>⚠️ No hay sports de tenis activos esta semana.</p>
              {probeResult.inactiveTennis?.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {probeResult.inactiveTennis.map(k=>(
                  <span key={k} style={{fontSize:9,padding:'3px 8px',borderRadius:4,background:C.s2,color:C.muted,border:`1px solid ${C.border}`}}>○ {k}</span>
                ))}
              </div>}
            </>}
          </>:<>
            <p style={{color:C.rose,fontSize:10}}>{probeResult.body}</p>
            {probeResult.status===401&&<p style={{color:C.amber,marginTop:6,fontSize:10}}>→ API key inválida o expirada.</p>}
            {probeResult.status===429&&<p style={{color:C.amber,marginTop:6,fontSize:10}}>→ Límite de peticiones alcanzado. Espera unos minutos.</p>}
          </>}
        </div>}
      </div>
    </div>;
  }

  const LVL_MAP={'Grand Slam':C.lime,'Masters 1000':C.amber,'WTA 1000':C.amber,'ATP 500':C.sky,'WTA 500':C.sky,'ATP 250':C.violet,'WTA 250':C.violet,'Tour':C.mutedL};

  return<div>
    {/* Header */}
    <div style={{marginBottom:16}}>
      <h2 style={{fontFamily:'Syne',fontWeight:900,fontSize:22,marginBottom:4}}>🏟️ Torneos del día</h2>
      <p style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono'}}>Selecciona un torneo para ver todos sus partidos con predicciones del modelo</p>
    </div>

    {/* Controls */}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{display:'flex',background:C.s2,borderRadius:8,padding:3,border:`1px solid ${C.border}`}}>
        {[['both','🎾 Todos'],['ATP','ATP'],['WTA','WTA']].map(([v,l])=>(
          <button key={v} onClick={()=>{setTour(v);setSelectedTourney(null);}} style={{padding:'6px 14px',borderRadius:6,border:'none',
            background:tour===v?C.lime+'22':'transparent',color:tour===v?C.lime:C.mutedL,fontWeight:700,fontSize:12,transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>
      <span style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono',marginLeft:'auto'}}>
        {filtered.length} torneo{filtered.length!==1?'s':''} activos
      </span>
    </div>

    {/* ESPN debug — muestra categorías recibidas para diagnosticar torneos perdidos */}
    {espnData&&<details style={{marginBottom:12,background:C.s2,borderRadius:8,border:`1px solid ${C.border}`}}>
      <summary style={{padding:'7px 12px',cursor:'pointer',fontSize:10,color:C.muted,fontFamily:'Syne Mono',userSelect:'none'}}>
        📡 ESPN debug — {Object.keys(espnData.tournaments||{}).length} torneos cargados · expandir para ver categorías
      </summary>
      <div style={{padding:'8px 12px',borderTop:`1px solid ${C.border}`,fontFamily:'Syne Mono',fontSize:9}}>
        <p style={{color:C.muted,marginBottom:6}}>Torneos recibidos (incluye ATP, WTA y excluye ITF/Challenger):</p>
        {Object.values(espnData.tournaments||{}).map(t=>(
          <div key={t.id} style={{display:'flex',gap:8,marginBottom:3,color:C.mutedL}}>
            <span style={{color:t.sport==='WTA'?C.rose:C.sky,fontWeight:700,minWidth:28}}>{t.sport}</span>
            <span style={{color:C.text}}>{t.name}</span>
            <span style={{color:C.muted}}>({t.matches.length} partidos)</span>
            <span style={{color:C.violet,fontSize:8}}>cat: {t.category}</span>
          </div>
        ))}
        {espnData.errors?.length>0&&espnData.errors.map((e,i)=>(
          <div key={i} style={{color:C.rose,marginTop:4}}>⚠️ {e}</div>
        ))}
        {Object.keys(espnData.tournaments||{}).length===0&&
          <p style={{color:C.rose}}>Sin torneos — revisa consola (F12) para ver window._espnResult</p>}

    </details>}

    <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16,alignItems:'start'}}>
      {/* Tourney list */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(t=>{
          const isSel=selectedTourney?.key===t.key;
          const lc=LVL_MAP[t.level]||C.lime;
          return<div key={t.key} onClick={()=>setSelectedTourney(isSel?null:t)}
            className={isSel?'glow':''}
            style={{background:isSel?C.s3:C.s2,border:`2px solid ${isSel?C.lime:t.hasOdds===false?C.amber+'44':C.border}`,
              borderRadius:12,padding:'14px 16px',cursor:'pointer',transition:'all .18s',
              opacity:t.hasOdds===false?0.8:1}}>
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
              <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:4,
                background:lc+'22',color:lc,fontFamily:'Syne Mono',textTransform:'uppercase'}}>{t.level}</span>
              <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,
                background:t.sport==='WTA'?C.rose+'22':C.sky+'22',
                color:t.sport==='WTA'?C.rose:C.sky,fontFamily:'Syne Mono'}}>{t.sport}</span>
              {t.hasOdds===false&&<span style={{fontSize:8,fontWeight:700,padding:'1px 5px',borderRadius:3,
                background:C.amber+'22',color:C.amber,fontFamily:'Syne Mono',marginLeft:'auto'}}>Sin líneas</span>}
            </div>
            <p style={{margin:'0 0 6px',fontWeight:700,fontSize:14,fontFamily:'Syne'}}>{t.name}</p>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <SurfBadge surf={t.surface} sz={9}/>
              {t.hasOdds!==false&&<span style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono'}}>{t.matches.length} partidos</span>}
              {t.hasOdds===false&&<span style={{fontSize:10,color:C.amber,fontFamily:'Syne Mono'}}>Solo predicciones</span>}
              {t.edgeCount>0&&<span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,
                background:C.lime+'22',color:C.lime,fontFamily:'Syne Mono',marginLeft:'auto'}}>
                🔥 {t.edgeCount} con valor
              </span>}
            </div>
          </div>;
        })}
      </div>

      {/* Matches panel */}
      <div>
        {!selectedTourney&&<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:48,textAlign:'center'}}>
          <p style={{fontSize:48,marginBottom:12}}>🏟️</p>
          <p style={{color:C.mutedL,fontFamily:'Syne Mono',fontSize:13,lineHeight:2}}>
            Selecciona un torneo de la izquierda<br/>para ver sus partidos con predicciones<br/>y detección de valor
          </p>
        </div>}
        {selectedTourney&&<div className="fade">
          {/* Tourney header */}
          <div style={{background:`linear-gradient(135deg,${C.s2},${C.s3})`,border:`1px solid ${C.border}`,
            borderRadius:12,padding:'14px 18px',marginBottom:12}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
              <h2 style={{fontFamily:'Syne',fontWeight:900,fontSize:20}}>{selectedTourney.name}</h2>
              <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:5,
                background:(LVL_MAP[selectedTourney.level]||C.lime)+'22',
                color:LVL_MAP[selectedTourney.level]||C.lime,fontFamily:'Syne Mono'}}>
                {selectedTourney.level}
              </span>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <SurfBadge surf={selectedTourney.surface}/>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4,
                background:selectedTourney.sport==='WTA'?C.rose+'22':C.sky+'22',
                color:selectedTourney.sport==='WTA'?C.rose:C.sky,fontFamily:'Syne Mono'}}>
                {selectedTourney.sport}
              </span>
              {selectedTourney.hasOdds===false
                ?<span style={{fontSize:11,color:C.amber,fontFamily:'Syne Mono'}}>
                  {selectedTourney._source==='calendar'
                    ?'📅 Sin cuotas disponibles · Predicciones del modelo'
                    :'📡 Partidos reales · Sin líneas de apuestas'}
                </span>
                :<span style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono'}}>
                  {selectedTourney.matches.length} partidos con líneas en vivo
                </span>
              }
            </div>
          </div>
          {/* Match cards */}
          {selectedTourney.hasOdds===false
            ?selectedTourney.matches.length===0
              ?<div style={{padding:32,textAlign:'center',color:C.muted,fontFamily:'Syne Mono',fontSize:12}}>
                No hay partidos registrados para hoy en este torneo
              </div>
              :selectedTourney.matches.map(m=>{
                const p1=m._p1resolved||findP(m.home_team);
                const p2=m._p2resolved||findP(m.away_team);
                return<MatchCardNoOdds key={m.id} p1={p1} p2={p2}
                  surface={selectedTourney.surface}
                  name1={m.home_team} name2={m.away_team}/>;
              })
            :selectedTourney.matches.map(m=>(
                <MatchCard key={m.id} match={m}
                  atpPlayers={atpData?.players}
                  wtaPlayers={wtaData?.players}/>
              ))
          }
        </div>}
      </div>
    </div>
  </div>;
}

// TAB: RANKINGS
// ═══════════════════════════════════════════
function RankingsTab({atpData,wtaData}){
  const [tour,setTour]=useState('ATP');
  const [sort,setSort]=useState('rank');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);
  const data=(tour==='ATP'?atpData:wtaData)?.players||[];
  const h2hMap=(tour==='ATP'?atpData:wtaData)?.h2h||{};

  const filtered=useMemo(()=>{
    let l=[...data];
    if(search.length>1) l=l.filter(p=>p.name?.toLowerCase().includes(search.toLowerCase())||p.country?.toLowerCase().includes(search.toLowerCase()));
    if(sort==='elo') l.sort((a,b)=>(b.overall||0)-(a.overall||0));
    else if(sort==='hard') l.sort((a,b)=>(b.Hard||0)-(a.Hard||0));
    else if(sort==='clay') l.sort((a,b)=>(b.Clay||0)-(a.Clay||0));
    else if(sort==='grass') l.sort((a,b)=>(b.Grass||0)-(a.Grass||0));
    else if(sort==='form') l.sort((a,b)=>(b.formAll?.slice(-10).reduce((x,y)=>x+y,0)||0)-(a.formAll?.slice(-10).reduce((x,y)=>x+y,0)||0));
    else if(sort==='winpct') l.sort((a,b)=>(b.winPct||0)-(a.winPct||0));
    else l.sort((a,b)=>a.rank-b.rank);
    return l;
  },[data,search,sort]);

  return<div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
      <div style={{display:'flex',background:C.s2,borderRadius:8,padding:3,border:`1px solid ${C.border}`}}>
        {[['ATP','🎾 ATP (300)',C.sky],['WTA','🎀 WTA (150)',C.rose]].map(([t,l,c])=>(
          <button key={t} onClick={()=>{setTour(t);setSelected(null);}} style={{padding:'6px 14px',borderRadius:6,border:'none',
            background:tour===t?c+'22':'transparent',color:tour===t?c:C.mutedL,fontWeight:700,fontSize:12,transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>
      <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'6px 10px',background:C.s2,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,fontFamily:'Syne Mono'}}>
        <option value="rank">Ranking ATP/WTA</option>
        <option value="elo">Elo Overall</option>
        <option value="hard">Elo Hard</option>
        <option value="clay">Elo Clay</option>
        <option value="grass">Elo Grass</option>
        <option value="form">Forma L10</option>
        <option value="winpct">Win %</option>
      </select>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="🔍 Nombre o país..."
        style={{padding:'6px 12px',background:C.s2,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,minWidth:180}}/>
      <span style={{fontSize:10,color:C.muted,fontFamily:'Syne Mono'}}>{filtered.length} jugadores</span>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,alignItems:'start'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,maxHeight:'78vh',overflowY:'auto',paddingRight:4}}>
        {filtered.slice(0,80).map(p=><PlayerCard key={p.id} p={p} onSelect={setSelected} selected={selected}/>)}
      </div>
      <div style={{position:'sticky',top:72}}>
        {selected
          ?<PlayerDetail p={selected} allPlayers={filtered} h2hMap={h2hMap}/>
          :<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:40,textAlign:'center'}}>
            <p style={{fontSize:48,marginBottom:12}}>🎾</p>
            <p style={{color:C.mutedL,fontSize:13,fontFamily:'Syne Mono',lineHeight:2}}>
              Selecciona un jugador<br/>para ver su perfil completo<br/>y simular predicciones
            </p>
          </div>
        }
      </div>
    </div>
  </div>;
}

// TAB: PARTIDOS (all matches)

function MatchesTab({atpData,wtaData,matches}){
  const [filter,setFilter]=useState('all');
  const filtered=useMemo(()=>{
    if(!matches) return [];
    if(filter==='atp') return matches.filter(m=>m._sport?.includes('atp'));
    if(filter==='wta') return matches.filter(m=>m._sport?.includes('wta'));
    return matches;
  },[matches,filter]);

  if(!matches) return<div style={{textAlign:'center',padding:'5rem'}}>
    <div style={{width:40,height:40,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.lime}`,borderRadius:'50%',margin:'0 auto 16px'}} className="spin"/>
    <p style={{color:C.lime,fontFamily:'Syne Mono'}}>Buscando líneas…</p>
  </div>;
  if(filtered.length===0) return<div style={{textAlign:'center',padding:'5rem'}}>
    <p style={{fontSize:56,marginBottom:16}}>🎾</p>
    <p style={{color:C.mutedL,fontFamily:'Syne Mono',fontSize:13,lineHeight:2}}>
      No hay partidos con líneas disponibles ahora<br/>
      <span style={{color:C.muted,fontSize:11}}>Las líneas aparecen durante semanas de torneos<br/>(Roland Garros, Wimbledon, US Open, Masters 1000…)</span>
    </p>
  </div>;

  return<div>
    <div className="chip-scroll" style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      {[['all','Todos'],['atp','ATP'],['wta','WTA']].map(([v,l])=>(
        <button key={v} onClick={()=>setFilter(v)} style={{padding:'6px 14px',borderRadius:6,
          border:`1px solid ${filter===v?C.lime:C.border}`,background:filter===v?C.lime+'22':'transparent',
          color:filter===v?C.lime:C.mutedL,fontWeight:700,fontSize:12}}>
          {l}
        </button>
      ))}
      <span style={{fontSize:11,color:C.muted,fontFamily:'Syne Mono',marginLeft:'auto'}}>{filtered.length} partidos</span>
    </div>
    {filtered.map(m=><MatchCard key={m.id} match={m} atpPlayers={atpData?.players} wtaPlayers={wtaData?.players}/>)}
  </div>;
}

// TAB: H2H COMPARE
// ═══════════════════════════════════════════
function CompareTab({atpData,wtaData}){
  const [tour,setTour]=useState('ATP');
  const [q1,setQ1]=useState(''),[q2,setQ2]=useState('');
  const [p1,setP1]=useState(null),[p2,setP2]=useState(null);
  const [surf,setSurf]=useState('Hard');
  const [show1,setShow1]=useState(false),[show2,setShow2]=useState(false);
  const data=(tour==='ATP'?atpData:wtaData)?.players||[];
  const h2hMap=(tour==='ATP'?atpData:wtaData)?.h2h||{};

  const search=(q,excl)=>q.length<2?[]:data.filter(x=>x.id!==excl?.id&&x.name?.toLowerCase().includes(q.toLowerCase())).slice(0,7);
  const h2hRaw=useMemo(()=>{
    if(!p1||!p2) return null;
    return h2hMap[[p1.id,p2.id].sort().join('_')]||null;
  },[p1,p2,h2hMap]);
  const h2hData=useMemo(()=>{
    if(!h2hRaw||!p1) return null;
    const isFirst=h2hRaw.p1===p1.id;
    return{p1w:isFirst?h2hRaw.w1:h2hRaw.w2,p2w:isFirst?h2hRaw.w2:h2hRaw.w1,matches:(h2hRaw.matches||[]).slice(-15).reverse()};
  },[h2hRaw,p1]);
  const pred=useMemo(()=>p1&&p2?predictMatch(p1,p2,surf,h2hData?{p1Wins:h2hData.p1w,p2Wins:h2hData.p2w}:null):null,[p1,p2,surf,h2hData]);

  const Picker=({q,setQ,p,setP,show,setShow,side})=>(
    <div style={{flex:1}}>
      <div style={{position:'relative',marginBottom:8}}>
        <input value={q} onChange={e=>{setQ(e.target.value);setP(null);setShow(true);}}
          onFocus={()=>setShow(true)}
          placeholder={`🔍 ${side==='left'?'Jugador 1':'Jugador 2'}…`}
          style={{width:'100%',padding:'10px 12px',background:C.s2,
            border:`2px solid ${p?(side==='left'?C.lime:C.rose):C.border}`,borderRadius:8,color:C.text,fontSize:13}}/>
        {show&&search(q,side==='left'?p2:p1).length>0&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,background:C.s2,border:`1px solid ${C.border}`,
            borderRadius:8,zIndex:30,boxShadow:'0 8px 32px #000000aa',maxHeight:250,overflowY:'auto'}}>
            {search(q,side==='left'?p2:p1).map(x=>(
              <div key={x.id} onClick={()=>{setP(x);setQ(x.name);setShow(false);}}
                style={{padding:'8px 12px',cursor:'pointer',display:'flex',gap:8,alignItems:'center',
                  borderBottom:`1px solid ${C.border}33`,fontSize:12}}>
                <Flag cc={x.country}/><span style={{flex:1}}>{x.name}</span>
                <span style={{color:C.muted,fontFamily:'Syne Mono',fontSize:10}}>#{x.rank}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {p&&<PlayerCard p={p} onSelect={()=>{}} selected={null}/>}
    </div>
  );

  return<div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      {[['ATP','🎾'],['WTA','🎀']].map(([t,ic])=>(
        <button key={t} onClick={()=>setTour(t)} style={{padding:'6px 14px',borderRadius:6,
          border:`1px solid ${tour===t?C.lime:C.border}`,background:tour===t?C.lime+'22':'transparent',
          color:tour===t?C.lime:C.mutedL,fontWeight:700,fontSize:12}}>{ic} {t}</button>
      ))}
      {['Hard','Clay','Grass'].map(s=>(
        <button key={s} onClick={()=>setSurf(s)} style={{padding:'6px 14px',borderRadius:6,
          border:`1px solid ${surf===s?SURF_CLR[normSurf(s)]:C.border}`,
          background:surf===s?SURF_CLR[normSurf(s)]+'22':'transparent',
          color:surf===s?SURF_CLR[normSurf(s)]:C.mutedL,fontWeight:700,fontSize:12}}>
          {SURF_ICO[normSurf(s)]} {s}
        </button>
      ))}
    </div>
    <div className="compare-row" style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:16}}>
      <Picker q={q1} setQ={setQ1} p={p1} setP={setP1} show={show1} setShow={setShow1} side="left"/>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minWidth:80,paddingTop:50}}>
        <span style={{fontSize:28,color:C.muted,marginBottom:8}}>⚔️</span>
        {pred&&<>
          <div style={{fontWeight:900,fontSize:22,color:pred.p1>pred.p2?C.lime:C.mutedL,fontFamily:'Syne',lineHeight:1}}>{pred.p1}%</div>
